<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" id="metaDesc" content="">
<title id="pageTitle">EduApps TH</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231e3a5f'/><text x='16' y='13' text-anchor='middle' fill='%23f59e0b' font-size='10' font-family='sans-serif'>%E2%9C%A6</text><text x='16' y='25' text-anchor='middle' fill='white' font-size='13' font-weight='bold' font-family='sans-serif'>K</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16243d; --ink-soft:#3a4a63;
  --gold:#f0a830; --gold-deep:#d4881a;
  --mint:#15a394; --mint-soft:#e7f6f3;
  --paper:#fbfaf7; --card:#ffffff;
  --line:#ece7dd; --slate:#6b7689;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;}
main#app{flex:1;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;}
h1,h2,h3,h4{font-family:'Kanit',sans-serif;font-weight:600;line-height:1.3;}

/* NAV */
#nav{background:rgba(251,250,247,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;
     height:66px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Kanit';font-size:1.2rem;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:10px;}
.logo::before{content:"✦";width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--ink),#24426e);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:1rem;box-shadow:0 2px 8px rgba(22,36,61,.25);}
.logo span{color:var(--gold-deep);}
.nav-links{display:flex;gap:6px;list-style:none;}
.nav-links a{padding:7px 14px;border-radius:8px;font-size:.95rem;font-weight:600;
             color:var(--ink-soft);transition:.15s;}
.nav-links a:hover{color:var(--ink);}
.nav-links a.active{color:var(--ink);background:rgba(240,168,48,.12);}
.nav-right{display:flex;align-items:center;gap:8px;}
.search-btn{background:var(--ink);border:none;padding:9px 16px;border-radius:9px;
            font-family:'Kanit';font-weight:500;font-size:.9rem;color:#fff;cursor:pointer;transition:transform .15s,box-shadow .2s;}
.search-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(22,36,61,.22);}
.hamburger{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--ink);}
@media(max-width:640px){
  .hamburger{display:block;}
  .nav-links,.nav-right{display:none;}
  .nav-links.open{display:flex;position:absolute;top:66px;left:0;right:0;background:var(--card);
                  flex-direction:column;padding:12px 16px;border-bottom:1px solid var(--line);z-index:99;}
}

/* LAYOUT */
.container{max-width:1100px;margin:0 auto;padding:0 24px;}
.divider{height:1px;background:var(--line);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:11px;
     font-family:'Kanit',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;border:none;transition:transform .15s,box-shadow .2s,background .2s;}
.btn-primary{background:var(--gold);color:var(--ink);box-shadow:0 4px 14px rgba(240,168,48,.38);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(240,168,48,.48);}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.btn-outline:hover{border-color:var(--ink);background:var(--card);}
.tag{display:inline-block;padding:3px 11px;border-radius:100px;font-size:.74rem;font-weight:700;}
.tag-tech{background:#fff3e6;color:var(--gold-deep);}
.tag-edu{background:var(--mint-soft);color:var(--mint);}
.tag-ai{background:#eef2fb;color:#3a5a9b;}
.tag-news{background:#fdf0f5;color:#b3457a;}
.tag-gen{background:#f3f1ec;color:var(--slate);}
.tag-math{background:#eef2fb;color:#3a5a9b;}
.tag-thai{background:var(--mint-soft);color:var(--mint);}
.tag-mgmt{background:#fdf0f5;color:#b3457a;}

/* AD SLOTS (ซ่อนเมื่อไม่มี AdSense — adSlot() คืนค่าว่าง) */
.ad-slot{display:none;}

/* TICKER */
.ticker{background:var(--ink);color:#dfe6f0;padding:9px 24px;
        display:flex;align-items:center;gap:12px;font-size:.84rem;overflow:hidden;}
.ticker-badge{background:var(--gold);color:var(--ink);font-size:.7rem;font-weight:800;
              padding:3px 10px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
.ticker-inner{overflow:hidden;flex:1;}
.ticker-text{white-space:nowrap;display:inline-block;animation:tick 30s linear infinite;}
@keyframes tick{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* CATEGORY FILTER (chips) */
.cat-strip{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px;}
.cat-pill{padding:7px 16px;border-radius:100px;border:1.5px solid var(--line);font-size:.9rem;
          font-weight:600;color:var(--ink-soft);cursor:pointer;background:var(--card);transition:.18s;}
.cat-pill:hover{border-color:var(--gold);color:var(--ink);}
.cat-pill.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* SEC HEADER — signature gold star */
.sec-head{display:flex;align-items:center;justify-content:space-between;
          margin-bottom:18px;}
.sec-title{font-family:'Kanit';font-size:1.4rem;font-weight:600;color:var(--ink);
           display:flex;align-items:center;gap:11px;}
.sec-bar{width:auto;height:auto;background:none;border-radius:0;font-size:1.15rem;line-height:1;}
.sec-bar::before{content:"✦";color:var(--gold);}
.sec-bar-green::before{color:var(--mint);}
.sec-more{font-size:.92rem;color:var(--mint);cursor:pointer;font-weight:700;
          display:inline-flex;align-items:center;gap:5px;transition:gap .2s;}
.sec-more:hover{gap:9px;}

/* HERO FEATURED */
.hero-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:18px;}
.feat-card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .25s;}
.feat-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(22,36,61,.13);}
.feat-img{height:260px;background:linear-gradient(135deg,#eef2f8,#e0e8f2);
          display:flex;align-items:center;justify-content:center;font-size:4rem;
          position:relative;}
.feat-badge{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.92);color:var(--gold-deep);
            font-size:.76rem;font-weight:700;padding:5px 13px;border-radius:100px;}
.feat-body{padding:22px 24px 26px;}
.feat-card h2{font-family:'Kanit';font-size:1.45rem;font-weight:600;line-height:1.3;margin-bottom:10px;}
.feat-card p{font-size:1rem;color:var(--ink-soft);line-height:1.7;}
.feat-meta{display:flex;gap:8px;align-items:center;margin-bottom:8px;font-size:.82rem;color:var(--mint);font-weight:700;}
.side-cards{display:flex;flex-direction:column;gap:14px;}
.side-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px 19px;cursor:pointer;transition:transform .18s,border-color .2s;}
.side-card:hover{transform:translateX(3px);border-color:var(--gold);}
.side-card h3{font-family:'Kanit';font-size:1.04rem;font-weight:600;line-height:1.35;margin-bottom:5px;}
.side-card p{font-size:.85rem;color:var(--ink-soft);}
.side-meta{display:flex;gap:7px;align-items:center;margin-bottom:6px;font-size:.78rem;color:var(--mint);font-weight:700;}

/* ARTICLES GRID */
.arts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.art-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:18px 19px;cursor:pointer;transition:transform .18s,box-shadow .22s;}
.art-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(22,36,61,.1);}
.art-meta{display:flex;gap:7px;align-items:center;margin-bottom:9px;font-size:.78rem;}
.art-card h3{font-family:'Kanit';font-size:1.05rem;font-weight:600;line-height:1.4;margin-bottom:7px;}
.art-card p{font-size:.86rem;color:var(--ink-soft);line-height:1.6;}
.art-date{font-size:.76rem;color:var(--slate);margin-top:10px;}

/* ARTICLE PAGE */
.art-wrap{max-width:720px;margin:0 auto;padding:40px 24px;}
.art-wrap h1{font-family:'Kanit';font-size:2rem;font-weight:700;line-height:1.3;margin-bottom:14px;}
.art-info{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:26px;
          padding-bottom:20px;border-bottom:1px solid var(--line);font-size:.85rem;color:var(--slate);}
.art-body h2{font-family:'Kanit';font-size:1.4rem;font-weight:600;margin:28px 0 10px;}
.art-body h3{font-family:'Kanit';font-size:1.12rem;font-weight:600;margin:20px 0 7px;}
.art-body p{margin-bottom:13px;line-height:1.9;font-size:1.04rem;}
.art-body ul,.art-body ol{margin:0 0 13px 22px;}
.art-body li{margin-bottom:6px;line-height:1.8;}
.art-body code{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;background:#f3f1ec;padding:1px 6px;border-radius:4px;font-size:.86em;color:var(--gold-deep);}
.art-body pre{background:#f3f1ec;border:1px solid var(--line);border-radius:10px;padding:14px;margin:14px 0;overflow-x:auto;}
.art-body pre code{background:none;padding:0;font-size:.88rem;color:var(--ink-soft);}
.art-body blockquote{border-left:3px solid var(--gold);padding:11px 18px;margin:14px 0;background:rgba(240,168,48,.08);border-radius:0 10px 10px 0;color:var(--ink-soft);}
.art-body a{color:var(--mint);text-decoration:underline;}
.art-body a.dl-btn,.dl-btn{display:inline-flex;align-items:center;gap:8px;background:var(--mint);color:#fff!important;text-decoration:none!important;padding:12px 22px;border-radius:11px;font-family:'Kanit';font-weight:500;font-size:.96rem;margin:8px 0;transition:.18s;}
.dl-btn:hover{background:#0e8576;transform:translateY(-1px);box-shadow:0 5px 16px rgba(21,163,148,.32);}
.art-body img{border-radius:10px;margin:12px 0;width:100%;}
.art-body table{width:100%;border-collapse:collapse;margin:14px 0;font-size:.92rem;}
.art-body th{text-align:left;padding:9px 11px;border-bottom:2px solid var(--line);font-weight:700;color:var(--ink-soft);}
.art-body td{padding:9px 11px;border-bottom:1px solid var(--line);}
.art-body strong{color:var(--ink);}

/* COMMENTS */
.comments-box{margin-top:40px;padding-top:30px;border-top:1px solid var(--line);}
.comments-box h3{font-family:'Kanit';font-size:1.2rem;font-weight:600;margin-bottom:18px;}
.comment-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:11px;}
.comment-meta{font-size:.82rem;color:var(--mint);margin-bottom:6px;font-weight:700;}
.comment-text{font-size:.92rem;line-height:1.7;}
.comment-form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:18px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-input,.form-ta{width:100%;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;
                      padding:10px 13px;font-family:'Sarabun',sans-serif;font-size:.92rem;color:var(--ink);outline:none;transition:border-color .2s;}
.form-input:focus,.form-ta:focus{border-color:var(--gold);}
.form-ta{min-height:100px;resize:vertical;}

/* APPS — homepage navy band (signature) */
.apps-box{background:linear-gradient(160deg,#16243d,#1f3656);border-radius:24px;padding:34px 32px;margin-bottom:28px;position:relative;z-index:1;}
.apps-box .sec-head{position:relative;z-index:1;border:none;}
.apps-box .sec-title{color:#fff;}
.apps-box .sec-more{color:var(--gold);}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;}
.app-card{border:1px solid var(--line);border-radius:14px;padding:17px;background:var(--card);transition:transform .2s,box-shadow .2s,background .2s;position:relative;}
.app-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(22,36,61,.1);z-index:50;}
/* app cards inside navy band → translucent white */
.apps-box .app-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);}
.apps-box .app-card:hover{background:rgba(255,255,255,.1);box-shadow:none;}
.apps-box .app-card h4{color:#fff;}
.apps-box .app-card p{color:rgba(255,255,255,.66);}
.apps-box .app-icon{background:rgba(240,168,48,.18);}
/* Hover Preview */
.app-preview{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) scale(.96);
  width:280px;background:var(--card);border-radius:14px;box-shadow:0 14px 44px rgba(15,23,42,.32);
  border:1px solid var(--line);overflow:hidden;z-index:200;
  opacity:0;visibility:hidden;transition:opacity .18s ease,transform .18s ease;pointer-events:none;}
.app-card:hover .app-preview{opacity:1;visibility:visible;transform:translateX(-50%) scale(1);}
/* การ์ดแถวบน → preview เด้งลงล่างแทน (กันโดน nav บัง) */
.app-card.preview-down .app-preview{bottom:auto;top:calc(100% + 10px);transform:translateX(-50%) scale(.96);}
.app-card.preview-down:hover .app-preview{transform:translateX(-50%) scale(1);}
.app-preview img{width:100%;height:160px;object-fit:cover;display:block;}
.app-preview-ph{width:100%;height:160px;background:linear-gradient(135deg,var(--ink),#2d4a72);
  display:flex;align-items:center;justify-content:center;font-size:3.5rem;}
.app-preview-info{padding:11px 13px;}
.app-preview-info p{font-size:.84rem;color:var(--ink-soft);line-height:1.5;margin-bottom:6px;}
.app-preview-lock{display:inline-flex;align-items:center;gap:5px;background:rgba(240,168,48,.12);
  color:var(--gold-deep);border:1px solid rgba(240,168,48,.3);padding:4px 11px;border-radius:100px;font-size:.76rem;font-weight:700;}
@media(hover:none) and (pointer:coarse){.app-preview{display:none;}}
.app-top{display:flex;align-items:center;gap:11px;margin-bottom:10px;}
.app-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
          justify-content:center;font-size:1.35rem;flex-shrink:0;background:rgba(240,168,48,.14);}
.icon-blue,.icon-green,.icon-purple,.icon-orange{background:rgba(240,168,48,.14);}
.app-card h4{font-family:'Kanit';font-size:1.06rem;font-weight:600;}
.app-card .tag{margin-top:3px;}
.app-card p{font-size:.86rem;color:var(--ink-soft);line-height:1.55;margin:8px 0 14px;min-height:36px;}
.app-btns{display:flex;gap:8px;}
.btn-open{flex:1;background:var(--gold);color:var(--ink);font-family:'Kanit',sans-serif;
          font-size:.88rem;font-weight:500;padding:10px 0;border-radius:9px;border:none;cursor:pointer;transition:background .2s;}
.btn-open:hover{background:var(--gold-deep);color:#fff;}
.btn-pmt{flex:1;background:var(--mint-soft);color:var(--mint);font-family:'Kanit',sans-serif;
         font-size:.88rem;font-weight:500;padding:10px 0;border-radius:9px;
         border:1px solid rgba(21,163,148,.25);cursor:pointer;transition:.15s;}
.btn-pmt.active,.btn-pmt:hover{background:#d4efeb;}
.pmt-box{background:var(--paper);border:1px solid var(--line);border-radius:9px;
         padding:11px;margin-top:9px;display:none;}
.pmt-box.open{display:block;}
.pmt-box pre{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:.76rem;color:var(--slate);
             white-space:pre-wrap;word-break:break-word;margin-bottom:8px;}
.btn-copy{background:none;border:none;color:var(--mint);font-family:'Kanit',sans-serif;
          font-size:.84rem;font-weight:500;cursor:pointer;}

/* homepage navy band overrides */
.apps-box .btn-open:hover{background:#fff;color:var(--ink);}
.apps-box .btn-pmt{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18);}
.apps-box .btn-pmt.active,.apps-box .btn-pmt:hover{background:rgba(255,255,255,.2);}
.apps-box .pmt-box{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.12);}
.apps-box .pmt-box pre{color:rgba(255,255,255,.7);}
.apps-box .btn-copy{color:var(--gold);}

/* PAGINATION */
.pagination{display:flex;gap:8px;justify-content:center;padding:28px 0;}
.page-btn{padding:9px 16px;border-radius:9px;border:1.5px solid var(--line);background:var(--card);
          font-family:'Kanit',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:.15s;}
.page-btn:hover,.page-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,.7);padding:36px 28px;margin-top:40px;}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;}
.footer-logo{font-family:'Kanit';font-size:1.1rem;font-weight:700;color:#fff;}
.footer-links{display:flex;gap:22px;font-size:.9rem;}
.footer-links a:hover{color:var(--gold);}

/* LOADING & EMPTY */
.loading{text-align:center;padding:60px;color:var(--slate);}
.empty{text-align:center;padding:60px;color:var(--slate);}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--line);
         border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* BACK BUTTON */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--slate);font-size:.9rem;
          margin-bottom:18px;cursor:pointer;transition:.15s;}
.back-btn:hover{color:var(--ink);}

/* SEARCH */
.search-row{display:flex;gap:11px;margin-bottom:18px;}
.search-in{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:12px;
           padding:12px 16px;font-family:'Sarabun',sans-serif;font-size:.95rem;
           color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;}
.search-in:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(240,168,48,.12);}

@media(max-width:768px){
  .hero-grid{grid-template-columns:1fr;}
  .arts-grid{grid-template-columns:repeat(2,1fr);}
  .form-row{grid-template-columns:1fr;}
  .apps-box{padding:24px 18px;}
}
@media(max-width:480px){
  .arts-grid{grid-template-columns:1fr;}
  .apps-grid{grid-template-columns:1fr;}
  .sec-title{font-size:1.2rem;}
}
@media(hover:none) and (pointer:coarse){
  .btn-open,.btn-pmt{padding:12px 0;font-size:.9rem;}
  .btn-copy{padding:9px 4px;}
  .btn{padding:13px 24px;}
  .nav-links a{padding:11px 16px;}
  .cat-pill,.filter-btn{padding:9px 17px;}
  .page-btn{padding:11px 17px;}
  .back-btn{padding:8px 0;}
  .sec-more{padding:6px 0;}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker" id="ticker">
  <span class="ticker-badge">ล่าสุด</span>
  <div class="ticker-inner"><span class="ticker-text" id="tickerText">กำลังโหลด...</span></div>
</div>

<!-- NAV -->
<nav id="nav">
  <div class="logo" onclick="go('/')"><span id="logoTitle">EduApps</span> TH</div>
  <ul class="nav-links" id="navLinks">
    <li><a href="#/" data-r="/">หน้าหลัก</a></li>
    <li><a href="#/blog" data-r="/blog">บทความ</a></li>
    <li><a href="#/apps" data-r="/apps">แอปทั้งหมด</a></li>
  </ul>
  <div class="nav-right">
    <button class="search-btn" onclick="go('/blog')">🔍 ค้นหา</button>
  </div>
  <button class="hamburger" onclick="toggleNav()">☰</button>
</nav>

<main id="app"><div class="loading"><div class="spinner"></div><br>กำลังโหลด...</div></main>

<!-- LOCK MODAL -->
<div id="lockModal" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(15,23,42,.7);align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:28px 24px;max-width:360px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:2.2rem;margin-bottom:8px;">🔒</div>
      <h3 style="font-size:1.1rem;font-weight:800;color:#0f172a;" id="lockTitle">แอปนี้ต้องใช้รหัสผ่าน</h3>

<script>
'use strict';
const API = '/api';
let S = {}; // site settings

// ── FETCH HELPERS (มี cache 30 วิ ลดการยิง API ซ้ำ) ──────
const _cache = new Map();
function get(url, ttl = 30000) {
  const hit = _cache.get(url);
  if (hit && Date.now() - hit.t < ttl) return Promise.resolve(hit.v);
  return fetch(API + url).then(r => r.json()).then(v => {
    _cache.set(url, { t: Date.now(), v });
    return v;
  });
}
const token = () => localStorage.getItem('_tok');

// ── ROUTER ───────────────────────────────────────────────
function route() {
  const h = location.hash.replace('#','') || '/';
  document.querySelectorAll('.nav-links a').forEach(a =>
    a.classList.toggle('active', a.dataset.r === h || (h==='/' && a.dataset.r==='/')));
  document.getElementById('navLinks').classList.remove('open');
  window.scrollTo(0,0);
  if (h === '/' || h === '')         renderHome();
  else if (h === '/blog')            renderBlog();
  else if (h.startsWith('/article/'))renderArticle(h.slice(9));
  else if (h === '/apps')            renderApps();
  else if (h === '/about')           renderAbout();
  else if (h === '/privacy')         renderPrivacy();
  else                               document.getElementById('app').innerHTML = empty('ไม่พบหน้านี้','🌌');
}

const go = hash => { location.hash = hash; };
window.addEventListener('hashchange', route);
const toggleNav = () => document.getElementById('navLinks').classList.toggle('open');

      </div>

            <div class="feat-badge">⭐ บทความแนะนำ</div>
          </div>
          <div class="feat-body">
            <div class="feat-meta"><span class="${catTag(feat.category)}">${feat.category}</span><span>${fmt(feat.created_at)}</span></div>

            <p>${feat.excerpt||''}</p>
          </div>
        </div>
        <div class="side-cards">
          ${sideArts.map(a=>`
          <div class="side-card" onclick="go('/article/${a.slug}')">
            <div class="side-meta"><span class="${catTag(a.category)}">${a.category}</span><span>${fmt(a.created_at)}</span></div>
            <h3>${a.title}</h3>
            <p>${a.excerpt||''}</p>
          </div>`).join('')}
        </div>
      </div>
    </div>` : ''}

    ${adSlot()}

    ${gridArts.length ? `
    <div style="margin-bottom:28px;">
      <div class="sec-head">
        <div class="sec-title"><div class="sec-bar"></div>บทความล่าสุด</div>
        <span class="sec-more" onclick="go('/blog')">ดูทั้งหมด →</span>

    ${appsArr.length ? `

        <div class="sec-title"><div class="sec-bar sec-bar-green"></div>🎮 แอปที่ใช้งานได้เลย — พร้อม Prompt</div>
        <span class="sec-more" onclick="go('/apps')">ดูทั้งหมด →</span>

// ── BLOG ─────────────────────────────────────────────────
let blogQ = '', blogCat = 'ทั้งหมด', blogPage = 1;
async function renderBlog(q, cat, page) {
  if (q !== undefined) blogQ = q;
  if (cat !== undefined) blogCat = cat;
  if (page !== undefined) blogPage = page;
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;

  const catParam = blogCat === 'ทั้งหมด' ? '' : blogCat;
  const url = `/articles?q=${encodeURIComponent(blogQ)}&category=${encodeURIComponent(catParam)}&page=${blogPage}`;
  const data = await get(url);
  const arts = data.articles || [];
  const total = data.total || 0;
  const pages = Math.ceil(total / 9);

  app.innerHTML = `
  <div class="container" style="padding-top:32px;padding-bottom:32px;">
    <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:20px;">📝 บทความทั้งหมด</h1>
    <div class="search-row">
      <input class="search-in" id="blogSearch" placeholder="🔍 ค้นหาบทความ..." value="${blogQ}"
        onkeydown="if(event.key==='Enter')renderBlog(this.value,undefined,1)">
      <button class="btn btn-primary" style="padding:9px 16px;" onclick="renderBlog(document.getElementById('blogSearch').value,undefined,1)">ค้นหา</button>
    </div>
    <div class="cat-strip" id="blogCats"></div>
    ${adSlot()}
    ${arts.length
      ? `<div class="arts-grid">${arts.map(artCard).join('')}</div>`
      : `<div class="empty">📭<br>ไม่พบบทความ</div>`}
    ${pages > 1 ? `
    <div class="pagination">
      ${blogPage > 1 ? `<button class="page-btn" onclick="renderBlog(undefined,undefined,${blogPage-1})">← ก่อนหน้า</button>` : ''}
      ${[...Array(Math.min(pages,5))].map((_,i)=>{
        const p = i+1;
        return `<button class="page-btn ${p===blogPage?'active':''}" onclick="renderBlog(undefined,undefined,${p})">${p}</button>`;
      }).join('')}
      ${blogPage < pages ? `<button class="page-btn" onclick="renderBlog(undefined,undefined,${blogPage+1})">ถัดไป →</button>` : ''}
    </div>` : ''}
  </div>`;
  loadBlogCats();
  activateAds();
}

function loadBlogCats() {
  const el = document.getElementById('blogCats');
  if (!el) return;
  const cats = ['ทั้งหมด', ...getCats()];
  el.innerHTML = cats.map(c =>
    `<span class="cat-pill ${blogCat===c?'active':''}" onclick="renderBlog(undefined,'${c}',1)">${c}</span>`
  ).join('');
}

// ── SINGLE ARTICLE ───────────────────────────────────────

      <a class="btn btn-outline" style="padding:6px 14px;font-size:.82rem;"
         href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}" target="_blank">📘 Facebook</a>
      <button class="btn btn-outline" style="padding:6px 14px;font-size:.82rem;"
              onclick="navigator.clipboard.writeText(location.href);this.textContent='✓ คัดลอกแล้ว'">🔗 คัดลอกลิงก์</button>
    </div>
    <div class="comments-box" id="cmtBox">
      <h3>💬 ความคิดเห็น (${(cmtData.comments||[]).length})</h3>
      ${(cmtData.comments||[]).map(c=>`
      <div class="comment-item">
        <div class="comment-meta">👤 ${esc(c.name)} · ${fmt(c.created_at)}</div>
        <div class="comment-text">${esc(c.content)}</div>
      </div>`).join('')}
      <div class="comment-form">
        <h4 style="font-size:.95rem;font-weight:700;margin-bottom:14px;">แสดงความคิดเห็น</h4>
        <div class="form-row">
          <input class="form-input" id="cmtName" placeholder="ชื่อของคุณ">
        </div>
        <textarea class="form-ta" id="cmtText" placeholder="เขียนความคิดเห็น..."></textarea>
        <button class="btn btn-primary" style="margin-top:10px;"
                onclick="submitComment(${art.id})">ส่งความคิดเห็น</button>
        <p id="cmtMsg" style="font-size:.83rem;color:#059669;margin-top:8px;display:none;"></p>
      </div>
    </div>
  </div>`;
  activateAds();
}

async function submitComment(articleId) {
  const name = document.getElementById('cmtName').value.trim();
  const content = document.getElementById('cmtText').value.trim();
  const msg = document.getElementById('cmtMsg');
  if (!name || !content) { showMsg(msg, 'กรุณากรอกชื่อและความคิดเห็น', '#ea580c'); return; }
  const res = await fetch(API + '/comments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ article_id: articleId, name, content })
  }).then(r => r.json());
  if (res.ok) {
    document.getElementById('cmtName').value = '';
    document.getElementById('cmtText').value = '';
    showMsg(msg, '✓ ส่งความคิดเห็นแล้ว รอการอนุมัติจากผู้ดูแล', '#059669');
  }
}

// ── APPS PAGE ────────────────────────────────────────────
let _allApps = [], _appFilter = 'all', _appSort = 'newest';

async function renderApps() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  const data = await get('/apps');
  _allApps = data.apps || [];
  _appFilter = 'all';
  _appSort = 'newest';
  drawApps();
}

function drawApps() {
  const app = document.getElementById('app');
  const cats = [...new Set(_allApps.map(a => a.category).filter(Boolean))];

  // --- sort ---
  const sorted = [..._allApps].sort((a, b) => {
    if (_appSort === 'oldest') return (a.created_at||'') > (b.created_at||'') ? 1 : -1;
    if (_appSort === 'name')   return (a.title||'').localeCompare(b.title||'', 'th');
    return (a.created_at||'') < (b.created_at||'') ? 1 : -1; // newest
  });

  // --- filter ---
  let filtered = sorted;
  if (_appFilter === 'free')   filtered = sorted.filter(a => !a.locked);
  else if (_appFilter === 'locked') filtered = sorted.filter(a => a.locked);
  else if (_appFilter !== 'all')    filtered = sorted.filter(a => a.category === _appFilter);

  // --- filter pills ---
  const pills = [
    {k:'all',    label:'ทั้งหมด'},
    {k:'free',   label:'🆓 ฟรี'},
    {k:'locked', label:'🔒 พรีเมียม'},
    ...cats.map(c => ({k:c, label:c})),
  ];

  const pillHTML = pills.map(p =>
    `<span class="cat-pill${_appFilter===p.k?' active':''}"
      onclick="setAppFilter('${p.k.replace(/'/g,"\\'")}')">
      ${p.label}${_appFilter===p.k&&_allApps.length?'':''}</span>`
  ).join('');

  const sortHTML = `
    <select onchange="setAppSort(this.value)"
      style="padding:7px 12px;border:1px solid #e2e8f0;border-radius:9px;font-family:'Sarabun',sans-serif;
             font-size:.85rem;font-weight:700;color:#1e293b;background:#fff;cursor:pointer;outline:none;">
      <option value="newest" ${_appSort==='newest'?'selected':''}>🕐 ล่าสุด</option>
      <option value="oldest" ${_appSort==='oldest'?'selected':''}>🕐 เก่าสุด</option>
      <option value="name"   ${_appSort==='name'  ?'selected':''}>🔤 ชื่อ A-Z</option>
    </select>`;

  // --- content ---
  let content = '';
  if (_appFilter === 'all' && filtered.length > 0) {
    // แยก 2 หมวดเมื่อไม่ได้กรอง
    const free   = filtered.filter(a => !a.locked);
    const locked = filtered.filter(a =>  a.locked);
    if (free.length > 0) content += `
      <div style="margin-bottom:28px;">
        <h2 style="font-size:1.05rem;font-weight:800;color:#059669;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
          🆓 แอปฟรี <span style="background:#f0fdf4;color:#059669;padding:2px 10px;border-radius:100px;font-size:.78rem;">${free.length}</span>
        </h2>
        <div class="apps-grid">${free.map(appCard).join('')}</div>
      </div>`;
    if (locked.length > 0) content += `
      <div style="margin-bottom:28px;">
        <h2 style="font-size:1.05rem;font-weight:800;color:#7c3aed;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
          🔒 แอปพรีเมียม <span style="background:#faf5ff;color:#7c3aed;padding:2px 10px;border-radius:100px;font-size:.78rem;">${locked.length}</span>
        </h2>
        <div class="apps-grid">${locked.map(appCard).join('')}</div>
      </div>`;
  } else if (filtered.length > 0) {
    content = `<div class="apps-grid">${filtered.map(appCard).join('')}</div>`;
  } else {
    content = `<div class="empty">📭<br>ไม่พบแอปที่ตรงกัน</div>`;
  }

  app.innerHTML = `
  <div class="container" style="padding-top:28px;padding-bottom:32px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
      <h1 style="font-size:1.5rem;font-weight:800;">🎮 แอปทั้งหมด</h1>
      ${sortHTML}
    </div>
    <div class="cat-strip" style="margin-bottom:20px;">${pillHTML}</div>
    ${adSlot()}
    ${content}
    <div style="margin-top:24px;">${adSlot()}</div>
  </div>`;
  activateAds();
}

function setAppFilter(f) { _appFilter = f; drawApps(); }
function setAppSort(s)   { _appSort   = s; drawApps(); }

// ── CARD TEMPLATES ───────────────────────────────────────
function artCard(a) {
  return `<div class="art-card" onclick="go('/article/${a.slug}')">
    <div class="art-meta"><span class="${catTag(a.category)}">${a.category}</span></div>
    <h3>${a.title}</h3>
    <p>${a.excerpt||''}</p>
    <div class="art-date">📅 ${fmt(a.created_at)}</div>
  </div>`;
}

function appCard(a) {
  const pid = `p_${a.id}`;
  const raw = sessionStorage.getItem('unlocked_'+a.id);
  const storedUrl = (raw && raw.startsWith('http')) ? raw : null;  // กัน '1' หรือค่าขยะ
  const isLocked = a.locked && !storedUrl;
  const appUrl = storedUrl || a.url;
  const previewImg = a.preview_image
    ? `<img src="${esc(a.preview_image)}" alt="Preview" loading="lazy" onerror="this.parentNode.innerHTML='<div class=app-preview-ph>${a.icon||'🎮'}</div>'">`
    : `<div class="app-preview-ph">${a.icon||'🎮'}</div>`;
  const preview = `
    <div class="app-preview">
      ${previewImg}
      <div class="app-preview-info">
        <p>${esc(a.description||'')}</p>
        ${isLocked ? '<span class="app-preview-lock">🔒 ต้องใช้รหัสปลดล็อก</span>' : ''}
      </div>
    </div>`;
  return `<div class="app-card">
    ${preview}
    ${isLocked?'<div style="position:absolute;top:10px;right:10px;font-size:1.1rem;" title="แอปนี้ต้องใช้รหัสผ่าน">🔒</div>':''}
    <div class="app-top">
      <div class="app-icon icon-blue">${a.icon||'🎮'}</div>
      <div><h4>${esc(a.title)}</h4><span class="tag tag-math" style="font-size:.7rem;">${esc(a.category)}</span></div>
    </div>
    <p>${esc(a.description||'')}</p>
    <div class="app-btns">
      ${isLocked
        ? `<button class="btn-open" style="background:#64748b;" onclick="openLockModal(${a.id},'${esc(a.title).replace(/'/g,"\\'")}','${a.icon||'🎮'}')">🔒 ปลดล็อก</button>`
        : (appUrl ? `<button class="btn-open" onclick="openAppViewer('${encodeURI(appUrl)}','${esc(a.title).replace(/'/g,"\\'")}','${a.icon||'🎮'}')">🚀 เปิดแอป</button>` : '')
      }
      ${a.prompt ? `<button class="btn-pmt" id="pb_${a.id}" onclick="togglePmt('${pid}','pb_${a.id}')">📋 Prompt</button>` : ''}
    </div>
    ${a.prompt ? `<div class="pmt-box" id="${pid}">
      <pre>${esc(a.prompt)}</pre>
      <button class="btn-copy" onclick="doCopyPre('${pid}',this)">📋 คัดลอก Prompt</button>
    </div>` : ''}
  </div>`;
}

// ── UTILS ─────────────────────────────────────────────────
// ตรวจตำแหน่งการ์ดก่อนแสดง preview — ถ้าด้านบนไม่มีที่พอ ให้เด้งลงล่าง
document.addEventListener('mouseover', e => {
  const card = e.target.closest('.app-card');
  if (!card || !card.querySelector('.app-preview')) return;
  const navH = document.getElementById('nav')?.offsetHeight || 66;
  const spaceAbove = card.getBoundingClientRect().top - navH;
  // preview สูง ~230px ถ้าที่ว่างด้านบนไม่พอ → เด้งลง
  card.classList.toggle('preview-down', spaceAbove < 250);
});

function togglePmt(pid, bid) {
  const box = document.getElementById(pid), btn = document.getElementById(bid);
  const open = box?.classList.contains('open');
  document.querySelectorAll('.pmt-box').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.btn-pmt').forEach(b=>b.classList.remove('active'));
  if (!open && box) { box.classList.add('open'); btn?.classList.add('active'); }
}

function doCopy(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ คัดลอกแล้ว!';
    setTimeout(() => btn.textContent = '📋 คัดลอก Prompt', 1800);
  });
}

function doCopyPre(pid, btn) {
  const pre = document.getElementById(pid)?.querySelector('pre');
  if (!pre) return;
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = '✓ คัดลอกแล้ว!';
    setTimeout(() => btn.textContent = '📋 คัดลอก Prompt', 1800);
  });
}

// ── APP PLAYER ───────────────────────────────────────────
let _viewerUrl = '';
function openAppViewer(url, title, icon) {
  _viewerUrl = url;
  document.getElementById('viewerFrame').src = url;
  document.getElementById('viewerTitle').textContent = title || 'แอป';
  document.getElementById('viewerIcon').textContent = icon || '🎮';
  document.getElementById('appViewer').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeAppViewer() {
  if (document.fullscreenElement) document.exitFullscreen?.();
  document.getElementById('appViewer').style.display = 'none';
  document.getElementById('viewerFrame').src = 'about:blank';
  document.body.style.overflow = '';
}
function openInNewTab() {
  if (_viewerUrl) window.open(_viewerUrl, '_blank');
}
// ขยายเต็มจอ — ใช้ Fullscreen API ของ device (จะหมุนแนวนอน/แนวตั้งตามแอปและอุปกรณ์)
function fullscreenApp() {
  const box = document.getElementById('viewerBox');
  if (!document.fullscreenElement) {
    const req = box.requestFullscreen || box.webkitRequestFullscreen || box.msRequestFullscreen;
    if (req) req.call(box);
    else {
      // iOS Safari fallback — fullscreen ที่ iframe โดยตรง
      const f = document.getElementById('viewerFrame');
      (f.webkitEnterFullscreen || f.requestFullscreen)?.call(f);
    }
  } else {
    document.exitFullscreen?.();
  }
}
// ปิด viewer ด้วยปุ่ม ESC (เฉพาะตอนไม่ได้อยู่ fullscreen)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.fullscreenElement
      && document.getElementById('appViewer').style.display === 'flex') closeAppViewer();
});

function catTag(cat) {
  const m = { 'เทคนิค':'tag tag-tech','วิชาการ':'tag tag-edu','AI & เครื่องมือ':'tag tag-ai','ข่าวการศึกษา':'tag tag-news' };
  return m[cat] || 'tag tag-gen';
}

function fmt(d) {
  if (!d) return '';
  try {
    return new Date(d).toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'});
  } catch { return d; }
}

function empty(msg, icon='📭') {
  return `<div class="empty"><div style="font-size:2.5rem;margin-bottom:12px;">${icon}</div><p>${msg}</p></div>`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// AdSense — แสดงโฆษณาจริงถ้าตั้งค่า Publisher ID แล้ว ไม่งั้นแสดง placeholder
function adSlot() {
  if (S.adsense_id) {
    return `<ins class="adsbygoogle" style="display:block;margin:20px 0;"
      data-ad-client="${S.adsense_id}" data-ad-format="auto" data-full-width-responsive="true"></ins>`;
  }
  return '';  // ยังไม่มี AdSense → ไม่แสดงอะไรเลย ไม่กินพื้นที่
}

function activateAds() {
  if (!S.adsense_id || !window.adsbygoogle) return;
  document.querySelectorAll('ins.adsbygoogle:not([data-adsbygoogle-status])').forEach(() => {
    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
  });
}

function showMsg(el, text, color) {
  el.textContent = text; el.style.color = color; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// ── CATEGORIES (อ่านจาก settings) ────────────────────────
function getCats() {
  try { return JSON.parse(S.article_categories || '[]'); } catch { return ['เทคนิค','วิชาการ','AI & เครื่องมือ','ข่าวการศึกษา','เคล็ดลับครู']; }
}
function loadCategories() {
  const el = document.getElementById('catStrip');
  if (!el) return;
  const cats = ['ทั้งหมด', ...getCats()];
  el.innerHTML = cats.map(c =>
    `<span class="cat-pill" onclick="go('/blog');setTimeout(()=>renderBlog(undefined,'${c}',1),50)">${c}</span>`
  ).join('');
}

// ── LOCK MODAL ────────────────────────────────────────────
let _lockAppId = null, _lockTitle = '', _lockIcon = '';
function openLockModal(id, title, icon) {
  _lockAppId = id; _lockTitle = title; _lockIcon = icon;
  document.getElementById('lockTitle').textContent = title;
  document.getElementById('lockInput').value = '';
  document.getElementById('lockErr').style.display = 'none';
  document.getElementById('lockModal').style.display = 'flex';
  setTimeout(() => document.getElementById('lockInput').focus(), 100);
}
function closeLockModal() { document.getElementById('lockModal').style.display = 'none'; }
async function submitLock() {
  const code = document.getElementById('lockInput').value.trim();
  if (!code) return;
  try {
    const r = await fetch(API + '/apps/' + _lockAppId + '/unlock', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code})
    });
    const d = await r.json();
    if (r.ok && d.url) {
      sessionStorage.setItem('unlocked_' + _lockAppId, d.url);  // เก็บ URL จริง ไม่ใช่ '1'
      closeLockModal();
      openAppViewer(d.url, _lockTitle, _lockIcon);
    } else {
      document.getElementById('lockErr').style.display = 'block';
      document.getElementById('lockInput').select();
    }
  } catch { document.getElementById('lockErr').style.display = 'block'; }
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  try {
    S = await get('/settings');
    const title = S.site_title || 'EduApps TH';
    document.getElementById('pageTitle').textContent = title;
    document.getElementById('metaDesc').content = S.site_desc || '';
    document.getElementById('logoTitle').textContent = title.replace(' TH','');
    document.getElementById('footerLogo').textContent = '✦ ' + title;
    document.getElementById('footerText').textContent = '© 2568 ' + title;

    // Open Graph / Twitter meta สำหรับแชร์โซเชียล
    setMeta('og:title', title);
    setMeta('og:description', S.site_desc || '');
    setMeta('og:type', 'website');
    setMeta('og:url', location.href);
    setMeta('twitter:card', 'summary');

    // โหลด AdSense loader script ถ้าตั้งค่าแล้ว
    if (S.adsense_id) {
      const sc = document.createElement('script');
      sc.async = true;
      sc.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${S.adsense_id}`;
      sc.crossOrigin = 'anonymous';
      document.head.appendChild(sc);
    }
  } catch(e) { console.log('Settings load error', e); }

  route();   // render เนื้อหาหลักทันที ไม่รอ ticker

  // Ticker เติมทีหลัง (ใช้ cache จาก renderHome — ไม่ยิงซ้ำ)
  get('/articles?page=1').then(artData => {
    const ticker = (artData.articles||[]).map(a=>a.title).join('  |  ');
    const el = document.getElementById('tickerText');
    if (el) el.textContent = ticker || '';
  }).catch(()=>{});
}

function setMeta(prop, content) {
  const attr = prop.startsWith('og:') ? 'property' : 'name';
  let el = document.querySelector(`meta[${attr}="${prop}"]`);
  if (!el) { el = document.createElement('meta'); el.setAttribute(attr, prop); document.head.appendChild(el); }
  el.content = content;
}

document.addEventListener('DOMContentLoaded', init);
window.togglePmt = togglePmt;
window.doCopy = doCopy;
window.doCopyPre = doCopyPre;
window.openAppViewer = openAppViewer;
window.closeAppViewer = closeAppViewer;
window.openInNewTab = openInNewTab;
window.fullscreenApp = fullscreenApp;
window.renderAbout = renderAbout;
window.renderPrivacy = renderPrivacy;
window.openLockModal = openLockModal;
window.closeLockModal = closeLockModal;
window.submitLock = submitLock;
window.setAppFilter = setAppFilter;
window.setAppSort = setAppSort;
window.go = go;
window.toggleNav = toggleNav;
window.renderBlog = renderBlog;
window.submitComment = submitComment;
</script>
