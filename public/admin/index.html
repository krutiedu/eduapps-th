<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการเว็บ — EduApps TH</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231e3a5f'/><text x='16' y='13' text-anchor='middle' fill='%23f59e0b' font-size='10' font-family='sans-serif'>%E2%9C%A6</text><text x='16' y='25' text-anchor='middle' fill='white' font-size='13' font-weight='bold' font-family='sans-serif'>K</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f4f8;}
.login-box{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:40px;width:100%;max-width:380px;}
.login-logo{font-size:1.1rem;font-weight:800;color:#2563eb;margin-bottom:6px;}
.login-sub{font-size:.88rem;color:#64748b;margin-bottom:28px;}
.login-box h2{font-size:1.3rem;font-weight:800;margin-bottom:20px;}

/* LAYOUT */
.admin-layout{display:flex;min-height:100vh;}
.sidebar{width:220px;background:#0f172a;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:50;transition:.25s;}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid #1e293b;}
.sidebar-logo-text{font-size:1rem;font-weight:800;color:#fff;}
.sidebar-logo-sub{font-size:.75rem;color:#475569;margin-top:2px;}
.sidebar-nav{padding:14px 0;}
.sidebar-sec{font-size:.68rem;font-weight:700;color:#475569;padding:10px 18px 4px;
             text-transform:uppercase;letter-spacing:.08em;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:.87rem;
          font-weight:700;color:#94a3b8;cursor:pointer;transition:.15s;border-left:3px solid transparent;}
.nav-item:hover,.nav-item.active{color:#fff;background:#1e293b;border-left-color:#2563eb;}
.nav-item .ni{font-size:1rem;}
.sidebar-footer{padding:14px 18px;border-top:1px solid #1e293b;}
.content{margin-left:220px;padding:24px;min-height:100vh;}
@media(max-width:640px){
  .sidebar{transform:translateX(-220px);}
  .sidebar.open{transform:translateX(0);}
  .content{margin-left:0;}
  .mobile-header{display:flex!important;}
}
.mobile-header{display:none;background:#0f172a;padding:12px 16px;align-items:center;gap:12px;position:sticky;top:0;z-index:40;}
.mobile-header-logo{font-size:.95rem;font-weight:800;color:#fff;}

/* COMPONENTS */
.page-title{font-size:1.4rem;font-weight:800;margin-bottom:20px;}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:16px;}
.card-title{font-size:.95rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;}
.stat-num{font-size:1.8rem;font-weight:800;color:#2563eb;}
.stat-label{font-size:.8rem;color:#64748b;margin-top:2px;}

/* FORMS */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:.83rem;font-weight:700;color:#475569;margin-bottom:6px;}
.form-input,.form-ta,.form-select{width:100%;background:#f8fafc;border:1px solid #e2e8f0;
  border-radius:8px;padding:9px 12px;font-family:'Sarabun',sans-serif;font-size:.92rem;color:#1e293b;outline:none;transition:.15s;}
.form-input:focus,.form-ta:focus,.form-select:focus{border-color:#93c5fd;background:#fff;}
.form-ta{min-height:140px;resize:vertical;font-size:.9rem;}
.form-select option{background:#fff;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}
/* Touch targets ≥44px บนอุปกรณ์สัมผัส */
@media(hover:none) and (pointer:coarse){
  .btn-sm{padding:10px 14px;font-size:.82rem;}
  .btn{padding:11px 20px;}
  .btn-ghost{padding:9px 12px;}
  .nav-item{padding:13px 18px;}
  .a-tab{padding:13px 18px;}
  .editor-toolbar button{padding:9px 12px;}
}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:8px;
     font-family:'Sarabun',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;border:none;transition:.15s;}
.btn-primary{background:#2563eb;color:#fff;}
.btn-primary:hover{background:#1d4ed8;}
.btn-success{background:#059669;color:#fff;}
.btn-success:hover{background:#047857;}
.btn-danger{background:#dc2626;color:#fff;}
.btn-danger:hover{background:#b91c1c;}
.btn-outline{background:#fff;color:#1e293b;border:1px solid #e2e8f0;}
.btn-outline:hover{background:#f8fafc;}
.btn-sm{padding:5px 12px;font-size:.8rem;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.87rem;}
th{text-align:left;padding:9px 10px;color:#64748b;font-weight:700;border-bottom:1px solid #e2e8f0;white-space:nowrap;}
td{padding:10px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
tr:hover td{background:#fafafa;}
.badge{display:inline-block;padding:2px 9px;border-radius:100px;font-size:.72rem;font-weight:700;}
.badge-green{background:#dcfce7;color:#166534;}
.badge-gray{background:#f1f5f9;color:#64748b;}
.badge-orange{background:#fff7ed;color:#9a3412;}

/* WYSIWYG EDITOR */
.editor-toolbar{display:flex;gap:4px;flex-wrap:wrap;padding:8px 10px;
                background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px 8px 0 0;border-bottom:none;}
.editor-toolbar button{background:#fff;border:1px solid #e2e8f0;border-radius:5px;
  padding:5px 9px;cursor:pointer;font-size:.85rem;font-family:'Sarabun',sans-serif;
  font-weight:700;transition:.15s;}
.editor-toolbar button:hover{background:#eff6ff;border-color:#93c5fd;}
.editor-body{min-height:280px;border:1px solid #e2e8f0;border-radius:0 0 8px 8px;
             padding:14px;outline:none;font-size:.95rem;line-height:1.85;background:#fff;}
.editor-body:focus{border-color:#93c5fd;}
.editor-body h2{font-size:1.25rem;font-weight:800;margin:20px 0 8px;}
.editor-body h3{font-size:1.05rem;font-weight:700;margin:16px 0 6px;}
.editor-body p{margin-bottom:12px;}
.editor-body img{border-radius:8px;max-width:100%;margin:8px 0;}
.editor-body blockquote{border-left:3px solid #2563eb;padding:8px 14px;background:#eff6ff;margin:10px 0;border-radius:0 6px 6px 0;}
.editor-body code{font-family:'Fira Code',monospace;background:#f1f5f9;padding:1px 6px;border-radius:4px;font-size:.88em;color:#ea580c;}
.editor-body pre{background:#f1f5f9;padding:12px;border-radius:6px;margin:10px 0;overflow-x:auto;}
.editor-body ul,.editor-body ol{margin:0 0 12px 22px;}
.editor-body li{margin-bottom:4px;}

/* UPLOAD BUTTON */
.upload-btn-wrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
.upload-hint{font-size:.78rem;color:#94a3b8;}

/* ALERT */
.alert{padding:12px 16px;border-radius:8px;font-size:.88rem;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.alert-success{background:#dcfce7;border:1px solid #86efac;color:#166534;}
.alert-danger{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;}
.alert-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
          display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;}
.modal h3{font-size:1.1rem;font-weight:800;margin-bottom:18px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid #e2e8f0;}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:#0f172a;color:#fff;
       padding:10px 18px;border-radius:8px;font-size:.88rem;font-weight:700;
       z-index:999;opacity:0;transform:translateY(6px);transition:.25s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.settings-grid{grid-template-columns:1fr;}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px;color:#94a3b8;}
.empty-state .ei{font-size:2.5rem;margin-bottom:12px;}
</style>
</head>
<body>

<div id="toast"></div>
<div id="modal"></div>

<!-- MOBILE HEADER -->
<div class="mobile-header" id="mobileHeader">
  <button onclick="toggleSidebar()" style="background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;">☰</button>
  <span class="mobile-header-logo">จัดการเว็บ</span>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-text" id="sideTitle">✦ EduApps TH</div>
    <div id="sideUser" style="font-size:.75rem;color:#94a3b8;margin-top:3px;padding:0 18px;"></div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-sec">หลัก</div>
    <div class="nav-item" data-page="dash" onclick="nav('dash')"><span class="ni">📊</span> Dashboard</div>
    <div class="sidebar-sec">เนื้อหา</div>
    <div class="nav-item" data-page="articles" onclick="nav('articles')"><span class="ni">📝</span> บทความทั้งหมด</div>
    <div class="nav-item" data-page="new-article" onclick="nav('new-article')"><span class="ni">✏️</span> เขียนบทความใหม่</div>
    <div class="nav-item admin-only" data-page="apps" onclick="nav('apps')" style="display:none;"><span class="ni">🎮</span> จัดการแอป</div>
    <div class="nav-item" data-page="comments" onclick="nav('comments')"><span class="ni">💬</span> ความคิดเห็น</div>
    <div class="sidebar-sec admin-only" style="display:none;">ระบบ</div>
    <div class="nav-item admin-only" data-page="codes" onclick="nav('codes')" style="display:none;"><span class="ni">🔑</span> รหัสปลดล็อก</div>
    <div class="nav-item admin-only" data-page="users" onclick="nav('users')" style="display:none;"><span class="ni">👥</span> จัดการผู้ใช้</div>
    <div class="nav-item admin-only" data-page="settings" onclick="nav('settings')" style="display:none;"><span class="ni">⚙️</span> ตั้งค่าเว็บ</div>
    <div class="sidebar-sec">บัญชีของฉัน</div>
    <div class="nav-item" data-page="profile" onclick="nav('profile')"><span class="ni">👤</span> โปรไฟล์</div>
  </nav>
  <div class="sidebar-footer">
    <div class="nav-item" onclick="doLogout()" style="border-left-color:transparent;">
      <span class="ni">🚪</span> ออกจากระบบ
    </div>
    <a href="/" style="display:flex;align-items:center;gap:9px;padding:9px 0;font-size:.82rem;color:#475569;text-decoration:none;" target="_blank">
      <span>🌐</span> ดูหน้าเว็บ
    </a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="content" id="content">
  <div class="empty-state"><div class="ei">⏳</div><p>กำลังโหลด...</p></div>
</div>

<!-- LOGIN PAGE (hidden by default) -->
<div class="login-page" id="loginPage" style="display:none;">
  <div class="login-box">
    <div class="login-logo">✦ EduApps TH</div>
    <div class="login-sub">ระบบจัดการเว็บ</div>
    <div id="loginAlert"></div>
    <div class="form-group">
      <label class="form-label">ชื่อผู้ใช้ <span style="color:#94a3b8;font-weight:400;">(เว้นว่าง = admin หลัก)</span></label>
      <input type="text" class="form-input" id="usernameInput" placeholder="username"
             onkeydown="if(event.key==='Enter')document.getElementById('pwdInput').focus()">
    </div>
    <div class="form-group">
      <label class="form-label">รหัสผ่าน</label>
      <input type="password" class="form-input" id="pwdInput" placeholder="กรอกรหัสผ่าน"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()">
      🔐 เข้าสู่ระบบ
    </button>
  </div>
</div>

<script>
const PREVIEW_CSS = `
/* ════════════════════════════════════════════════════════
   KRU-TI ครูติ TH v2 — "กระดานดำ & ดาวทอง"
   มงกุฎหมึกเข้ม (nav+บทความเด่น) → กระดาษอุ่น → ชั้นแอปน้ำเงิน
   Display: Pridi | Body: Sarabun | ✦ ใช้เฉพาะ: โลโก้ / ตรา / หัวข้อ
════════════════════════════════════════════════════════ */
:root{
  --ink:#101c33; --ink-2:#18294a; --ink-3:#234070;
  --ink-soft:#3d4c68;
  --gold:#f3ac2e; --gold-bright:#ffc555; --gold-deep:#c47f0e; --gold-soft:rgba(243,172,46,.13);
  --chalk:#f5efdf;
  --mint:#0fa294; --mint-soft:#e4f4f1;
  --paper:#faf7f1; --card:#ffffff;
  --line:#e8e1d3; --line-soft:#f1ecdf;
  --slate:#6d7588;
  --shadow-sm:0 2px 10px rgba(16,28,51,.07);
  --shadow-md:0 10px 30px rgba(16,28,51,.12);
  --shadow-lg:0 22px 56px rgba(16,28,51,.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--paper);color:var(--ink);
     display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;}
main#app{flex:1;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;}
h1,h2,h3,h4{font-family:'Pridi',serif;font-weight:600;line-height:1.35;}
::selection{background:var(--gold-soft);color:var(--ink);}

@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.rv{animation:rise .5s cubic-bezier(.22,.8,.3,1) both;}
.rv2{animation:rise .5s .08s cubic-bezier(.22,.8,.3,1) both;}
.rv3{animation:rise .5s .16s cubic-bezier(.22,.8,.3,1) both;}

/* ── โซนหัวเว็บ (หมึกเข้มทั้งแผง) ── */
#topzone{background:var(--ink);position:relative;}
#topzone::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
  background:
    radial-gradient(1.5px 1.5px at 12% 30%, rgba(243,172,46,.8) 50%, transparent 51%),
    radial-gradient(1px 1px at 28% 70%, rgba(255,255,255,.5) 50%, transparent 51%),
    radial-gradient(1.5px 1.5px at 45% 20%, rgba(243,172,46,.6) 50%, transparent 51%),
    radial-gradient(1px 1px at 62% 60%, rgba(255,255,255,.4) 50%, transparent 51%),
    radial-gradient(2px 2px at 78% 35%, rgba(243,172,46,.7) 50%, transparent 51%),
    radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,.5) 50%, transparent 51%);}

/* ticker */
.ticker{color:#aebad0;padding:8px 22px;border-bottom:1px solid rgba(255,255,255,.07);
        display:flex;align-items:center;gap:12px;font-size:.82rem;overflow:hidden;position:relative;z-index:2;}
.ticker-badge{background:var(--gold);color:var(--ink);font-size:.68rem;font-weight:800;
              padding:3px 11px;border-radius:5px;white-space:nowrap;flex-shrink:0;letter-spacing:.05em;}
.ticker-inner{overflow:hidden;flex:1;}
.ticker-text{white-space:nowrap;display:inline-block;will-change:transform;}

/* nav บนพื้นเข้ม */
#nav{height:66px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;
     position:relative;z-index:2;}
.logo{font-family:'Pridi',serif;font-size:1.3rem;font-weight:700;color:#fff;cursor:pointer;
      display:flex;align-items:center;gap:11px;line-height:1;}
.logo::before{content:"✦";width:38px;height:38px;border-radius:11px;
  background:linear-gradient(135deg,var(--gold) 10%,var(--gold-deep));display:flex;align-items:center;justify-content:center;
  color:var(--ink);font-size:1.1rem;box-shadow:0 4px 14px rgba(243,172,46,.35);}
.logo span{color:var(--gold-bright);}
.logo em{font-style:normal;font-family:'Sarabun';font-size:.7rem;font-weight:700;color:#7587a5;
         align-self:flex-start;margin-top:2px;letter-spacing:.1em;}
.nav-links{display:flex;gap:2px;list-style:none;}
.nav-links a{padding:9px 16px;border-radius:9px;font-size:.94rem;font-weight:600;
             color:#aebad0;transition:color .15s,background .15s;}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.07);}
.nav-links a{position:relative;}
.nav-links a.active{color:var(--gold-bright);background:rgba(243,172,46,.1);}
.nav-links a.active::after{content:"";position:absolute;left:16px;right:16px;bottom:4px;height:2.5px;
  border-radius:2px;background:var(--gold);}
.nav-right{display:flex;align-items:center;gap:8px;}
.search-btn{background:var(--gold);border:none;padding:10px 18px;border-radius:10px;
            font-family:'Sarabun';font-weight:700;font-size:.88rem;color:var(--ink);cursor:pointer;
            display:inline-flex;align-items:center;gap:7px;transition:transform .15s,box-shadow .2s,background .15s;}
.search-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(243,172,46,.4);background:var(--gold-bright);}
.search-btn:focus-visible{outline:2px solid #fff;outline-offset:2px;}
.hamburger{display:none;background:none;border:none;font-size:1.45rem;cursor:pointer;color:#fff;}
@media(max-width:640px){
  .hamburger{display:block;}
  .nav-links,.nav-right{display:none;}
  .nav-links.open{display:flex;position:absolute;top:66px;left:0;right:0;background:var(--ink-2);
                  flex-direction:column;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);
                  box-shadow:var(--shadow-md);z-index:99;}
}

/* ── มงกุฎ: บทความเด่นบนกระดานดำ (เฉพาะหน้าแรก) ── */
.crown{position:relative;z-index:1;padding:34px 0 52px;color:#fff;}
.crown-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:40px;align-items:center;}
.crown-feat{cursor:pointer;}
.crown-meta{display:flex;gap:12px;align-items:center;margin-bottom:16px;font-size:.84rem;color:#8fa0bf;font-weight:600;}
.crown-cat{background:rgba(243,172,46,.16);color:var(--gold-bright);border:1px solid rgba(243,172,46,.35);
  padding:4px 14px;border-radius:100px;font-size:.76rem;font-weight:700;}
.crown-feat h2{font-size:clamp(1.65rem,3.6vw,2.5rem);font-weight:700;line-height:1.4;
  color:var(--chalk);margin-bottom:16px;transition:color .2s;}
.crown-feat h2 mark{background:none;color:var(--gold-bright);}
.crown-feat:hover h2{color:#fff;}
.crown-feat .cx{font-size:1.02rem;color:#9fb0cd;line-height:1.9;max-width:56ch;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.crown-read{margin-top:22px;display:inline-flex;align-items:center;gap:9px;color:var(--gold-bright);
  font-weight:800;font-size:.95rem;transition:gap .2s;}
.crown-feat:hover .crown-read{gap:15px;}
/* ตราดาว — ที่เดียวบนหน้า */
.crown-feat{position:relative;}
.stamp{position:absolute;top:-14px;right:6px;width:68px;height:68px;border-radius:50%;
  border:2px dashed rgba(243,172,46,.65);transform:rotate(9deg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;z-index:3;pointer-events:none;}
.stamp b{color:var(--gold);font-size:1.5rem;line-height:1;}
.stamp small{font-size:.56rem;font-weight:800;color:var(--gold);letter-spacing:.12em;}
/* มินิลิสต์ น่าอ่านต่อ (ในมงกุฎ) */
.crown-side{display:flex;flex-direction:column;gap:10px;}
.crown-side-label{font-size:.78rem;font-weight:800;color:#7587a5;letter-spacing:.16em;margin-bottom:2px;}
.crown-item{display:flex;gap:14px;align-items:flex-start;padding:13px 16px;border-radius:13px;cursor:pointer;
  background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);transition:background .15s,border-color .15s;}
.crown-item:hover{background:rgba(255,255,255,.09);border-color:rgba(243,172,46,.4);}
.crown-num{font-family:'Pridi',serif;font-size:1.3rem;font-weight:700;color:var(--gold);line-height:1.15;flex-shrink:0;width:22px;}
.crown-item h3{font-family:'Sarabun';font-size:.94rem;font-weight:700;line-height:1.55;color:#dde4f0;}
.crown-item:hover h3{color:#fff;}
.crown-item .ci-cat{font-size:.74rem;color:#8fa0bf;font-weight:600;margin-top:3px;}
/* รอยต่อมงกุฎ → กระดาษ */
.crown-edge{height:30px;background:var(--paper);border-radius:28px 28px 0 0;margin-top:-30px;position:relative;z-index:2;}

/* ── LAYOUT ── */
.container{max-width:1120px;margin:0 auto;padding:0 22px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;
     font-family:'Sarabun',sans-serif;font-size:.94rem;font-weight:700;cursor:pointer;border:none;
     transition:transform .15s,box-shadow .2s,background .2s;}
.btn-primary{background:var(--gold);color:var(--ink);box-shadow:0 4px 14px rgba(243,172,46,.36);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(243,172,46,.46);}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.btn-outline:hover{border-color:var(--ink);background:var(--card);}

.tag{display:inline-block;padding:3px 12px;border-radius:100px;font-size:.73rem;font-weight:700;}
.tag-tech{background:#fdf2e2;color:var(--gold-deep);}
.tag-edu{background:var(--mint-soft);color:var(--mint);}
.tag-ai{background:#ebf0fa;color:#3a5a9b;}
.tag-news{background:#fdeef5;color:#b3457a;}
.tag-gen{background:#f1ede4;color:var(--slate);}
.tag-math{background:#ebf0fa;color:#3a5a9b;}
.tag-thai{background:var(--mint-soft);color:var(--mint);}
.tag-mgmt{background:#fdeef5;color:#b3457a;}

/* ── SECTION HEADS — แท่งทองนำสายตา ── */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:14px;}
.sec-title{font-family:'Pridi',serif;font-size:1.55rem;font-weight:700;color:var(--ink);line-height:1.25;
  position:relative;padding-left:18px;}
.sec-title::before{content:"";position:absolute;left:0;top:8%;bottom:8%;width:5px;border-radius:3px;
  background:linear-gradient(180deg,var(--gold),var(--gold-deep));}
.sec-title.mint::before{background:linear-gradient(180deg,var(--mint),#0a7d72);}
.sec-sub{font-size:.88rem;color:var(--slate);margin-top:3px;padding-left:18px;}
.sec-more{font-size:.9rem;color:var(--gold-deep);cursor:pointer;font-weight:800;flex-shrink:0;
          display:inline-flex;align-items:center;gap:6px;transition:gap .2s;padding-bottom:4px;}
.sec-more:hover{gap:11px;}

/* ── ARTICLES GRID ── */
.arts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.art-card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:22px 22px 19px;cursor:pointer;display:flex;flex-direction:column;position:relative;overflow:hidden;
  transition:transform .18s,box-shadow .22s,border-color .2s;}
.art-card::after{content:"";position:absolute;left:0;right:0;top:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--gold-bright));transform:scaleX(0);transform-origin:left;transition:transform .25s;}
.art-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-md);border-color:#ded2b8;}
.art-card:hover::after{transform:scaleX(1);}
.art-meta{display:flex;gap:7px;align-items:center;margin-bottom:11px;font-size:.78rem;}
.art-card h3{font-size:1.1rem;font-weight:600;line-height:1.5;margin-bottom:8px;}
.art-card p{font-size:.87rem;color:var(--ink-soft);line-height:1.75;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.art-date{font-size:.76rem;color:var(--slate);margin-top:14px;font-weight:600;}

/* ── ARTICLE PAGE ── */
.art-wrap{max-width:730px;margin:0 auto;padding:42px 22px;}
.art-wrap h1{font-size:clamp(1.6rem,3.4vw,2.15rem);font-weight:700;line-height:1.42;margin-bottom:16px;}
.art-info{display:flex;gap:13px;align-items:center;flex-wrap:wrap;margin-bottom:28px;
          padding-bottom:20px;border-bottom:1px solid var(--line);font-size:.85rem;color:var(--slate);}
.art-body h2{font-size:1.42rem;font-weight:600;margin:30px 0 11px;}
.art-body h3{font-size:1.14rem;font-weight:600;margin:22px 0 8px;}
.art-body p{margin-bottom:14px;line-height:1.95;font-size:1.04rem;}
.art-body ul,.art-body ol{margin:0 0 14px 22px;}
.art-body li{margin-bottom:6px;line-height:1.85;}
.art-body code{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;background:#f1ede4;
  padding:1px 7px;border-radius:5px;font-size:.86em;color:var(--gold-deep);}
.art-body pre{background:var(--ink);border-radius:12px;padding:16px 18px;margin:15px 0;overflow-x:auto;}
.art-body pre code{background:none;padding:0;font-size:.88rem;color:var(--chalk);}
.art-body blockquote{border-left:3px solid var(--gold);padding:12px 19px;margin:15px 0;
  background:var(--gold-soft);border-radius:0 11px 11px 0;color:var(--ink-soft);}
.art-body a{color:var(--mint);text-decoration:underline;}
.art-body a.dl-btn,.dl-btn{display:inline-flex;align-items:center;gap:8px;background:var(--mint);
  color:#fff!important;text-decoration:none!important;padding:12px 23px;border-radius:12px;
  font-family:'Sarabun';font-weight:700;font-size:.95rem;margin:8px 0;transition:.18s;}
.dl-btn:hover{background:#0c8276;transform:translateY(-1px);box-shadow:0 5px 16px rgba(15,162,148,.32);}
.art-body img{border-radius:11px;margin:13px 0;width:100%;}
.art-body table{width:100%;border-collapse:collapse;margin:15px 0;font-size:.92rem;}
.art-body th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--line);font-weight:700;color:var(--ink-soft);}
.art-body td{padding:10px 12px;border-bottom:1px solid var(--line);}
.art-body strong{color:var(--ink);}

/* ── COMMENTS ── */
.comments-box{margin-top:42px;padding-top:30px;border-top:1px solid var(--line);}
.comments-box h3{font-size:1.22rem;font-weight:600;margin-bottom:18px;}
.comment-item{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 18px;margin-bottom:11px;}
.comment-meta{font-size:.82rem;color:var(--mint);margin-bottom:6px;font-weight:700;}
.comment-text{font-size:.93rem;line-height:1.75;}
.comment-form{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:20px;margin-top:18px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-input,.form-ta{width:100%;background:var(--paper);border:1.5px solid var(--line);border-radius:11px;
  padding:11px 14px;font-family:'Sarabun',sans-serif;font-size:.93rem;color:var(--ink);outline:none;
  transition:border-color .2s,box-shadow .2s;}
.form-input:focus,.form-ta:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft);}
.form-ta{min-height:100px;resize:vertical;}

/* ── ชั้นแอปน้ำเงิน (สลับจังหวะกับกระดาษ) ── */
.apps-box{background:linear-gradient(150deg,var(--ink) 20%,var(--ink-2) 75%,#1d3458);
  border-radius:26px;padding:38px 36px 36px;margin-bottom:34px;position:relative;z-index:1;overflow:visible;}
.apps-box .sec-title{color:#fff;}
.apps-box .sec-sub{color:#8fa0bf;}
.apps-box .sec-more{color:var(--gold-bright);}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:15px;}
.app-card{border:1px solid var(--line);border-radius:16px;padding:19px;background:var(--card);
  transition:transform .2s,box-shadow .2s,background .2s;position:relative;}
.app-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);z-index:50;}
.apps-box .app-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);}
.apps-box .app-card:hover{background:rgba(255,255,255,.11);box-shadow:none;}
.apps-box .app-card h4{color:#fff;}
.apps-box .app-card p{color:rgba(255,255,255,.68);}
.apps-box .app-icon{background:rgba(243,172,46,.2);}

.app-preview{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) scale(.96);
  width:280px;background:var(--card);border-radius:15px;box-shadow:0 16px 48px rgba(10,17,32,.36);
  border:1px solid var(--line);overflow:hidden;z-index:200;
  opacity:0;visibility:hidden;transition:opacity .18s ease,transform .18s ease;pointer-events:none;}
.app-card:hover .app-preview{opacity:1;visibility:visible;transform:translateX(-50%) scale(1);}
.app-card.preview-down .app-preview{bottom:auto;top:calc(100% + 10px);transform:translateX(-50%) scale(.96);}
.app-card.preview-down:hover .app-preview{transform:translateX(-50%) scale(1);}
.app-preview img{width:100%;height:160px;object-fit:cover;display:block;}
.app-preview-ph{width:100%;height:160px;background:linear-gradient(135deg,var(--ink),var(--ink-3));
  display:flex;align-items:center;justify-content:center;font-size:3.5rem;}
.app-preview-info{padding:12px 14px;}
.app-preview-info p{font-size:.84rem;color:var(--ink-soft);line-height:1.55;margin-bottom:6px;}
.app-preview-lock{display:inline-flex;align-items:center;gap:5px;background:var(--gold-soft);
  color:var(--gold-deep);border:1px solid rgba(243,172,46,.32);padding:4px 12px;border-radius:100px;
  font-size:.76rem;font-weight:700;}
@media(hover:none) and (pointer:coarse){.app-preview{display:none;}}

.app-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.app-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:1.45rem;flex-shrink:0;background:var(--gold-soft);}
.icon-blue,.icon-green,.icon-purple,.icon-orange{background:var(--gold-soft);}
.app-card h4{font-family:'Pridi',serif;font-size:1.08rem;font-weight:600;line-height:1.3;}
.app-card .tag{margin-top:4px;}
.app-card p{font-size:.86rem;color:var(--ink-soft);line-height:1.6;margin:9px 0 14px;min-height:38px;}
.app-btns{display:flex;gap:8px;}
.btn-open{flex:1;background:var(--gold);color:var(--ink);font-family:'Sarabun';
  font-size:.88rem;font-weight:700;padding:10px 0;border-radius:10px;border:none;cursor:pointer;transition:background .2s,color .2s;}
.btn-open:hover{background:var(--gold-deep);color:#fff;}
.btn-pmt{flex:1;background:var(--mint-soft);color:var(--mint);font-family:'Sarabun';
  font-size:.88rem;font-weight:700;padding:10px 0;border-radius:10px;
  border:1px solid rgba(15,162,148,.25);cursor:pointer;transition:.15s;}
.btn-pmt.active,.btn-pmt:hover{background:#d2efe9;}
.pmt-box{background:var(--paper);border:1px solid var(--line);border-radius:10px;
  padding:12px;margin-top:9px;display:none;}
.pmt-box.open{display:block;}
.pmt-box pre{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:.76rem;color:var(--slate);
  white-space:pre-wrap;word-break:break-word;margin-bottom:8px;}
.btn-copy{background:none;border:none;color:var(--mint);font-family:'Sarabun';
  font-size:.84rem;font-weight:700;cursor:pointer;}
.apps-box .btn-open:hover{background:#fff;color:var(--ink);}
.apps-box .btn-pmt{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18);}
.apps-box .btn-pmt.active,.apps-box .btn-pmt:hover{background:rgba(255,255,255,.2);}
.apps-box .pmt-box{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.12);}
.apps-box .pmt-box pre{color:rgba(255,255,255,.72);}
.apps-box .btn-copy{color:var(--gold-bright);}

/* ── ตั๋วรหัส ── */
.redeem-row{position:relative;display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#fffdf8,#fdf6e6);border:2px dashed var(--gold);
  border-radius:15px;padding:9px 11px 9px 17px;margin-bottom:26px;flex-wrap:wrap;}
.redeem-row::before,.redeem-row::after{content:"";position:absolute;top:50%;transform:translateY(-50%);
  width:18px;height:18px;border-radius:50%;background:var(--paper);}
.redeem-row::before{left:-11px;box-shadow:inset -2px 0 0 var(--gold);}
.redeem-row::after{right:-11px;box-shadow:inset 2px 0 0 var(--gold);}
.redeem-row:focus-within{box-shadow:0 0 0 4px var(--gold-soft);}
.redeem-ico{font-size:1.15rem;}
.redeem-row input{flex:1;min-width:160px;border:none;outline:none;background:none;
  font-family:'Sarabun';font-size:.96rem;font-weight:600;color:var(--ink);padding:8px 0;letter-spacing:.04em;}
.redeem-row input::placeholder{font-weight:400;letter-spacing:0;color:#a39a85;}
.redeem-row button{background:var(--gold);color:var(--ink);border:none;border-radius:10px;
  padding:11px 22px;font-family:'Sarabun';font-weight:700;font-size:.9rem;cursor:pointer;transition:background .2s,color .2s;}
.redeem-row button:hover{background:var(--gold-deep);color:#fff;}
#redeemMsg{font-size:.86rem;font-weight:700;}
#redeemMsg:empty{display:none;}
@media(max-width:560px){
  .redeem-row input{min-width:120px;}
  #redeemMsg{width:100%;padding-left:6px;}
}

.ad-slot{display:none;}

/* ── FILTER PILLS ── */
.cat-strip{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px;}
.cat-pill{padding:8px 18px;border-radius:100px;border:1.5px solid var(--line);font-size:.88rem;
  font-weight:600;color:var(--ink-soft);cursor:pointer;background:var(--card);transition:.18s;}
.cat-pill:hover{border-color:var(--gold);color:var(--ink);}
.cat-pill.active{background:var(--ink);color:var(--gold-bright);border-color:var(--ink);}

/* ── SEARCH ── */
.search-row{display:flex;gap:11px;margin-bottom:18px;}
.search-in{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:13px;
  padding:13px 18px;font-family:'Sarabun',sans-serif;font-size:.95rem;
  color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;}
.search-in:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft);}

/* ── หัวหน้า blog/apps — ดาวลายน้ำใหญ่ (จุดเดียว) ── */
.page-head{padding:38px 0 6px;margin-bottom:20px;position:relative;overflow:visible;}
.page-head::after{content:"✦";position:absolute;right:-6px;top:-14px;font-size:7.5rem;line-height:1;
  color:var(--gold);opacity:.1;pointer-events:none;}
.page-head h1{font-size:clamp(1.7rem,3.2vw,2.2rem);font-weight:700;}
.page-head .ph-sub{font-size:.95rem;color:var(--slate);margin-top:6px;}

/* ── PAGINATION ── */
.pagination{display:flex;gap:8px;justify-content:center;padding:30px 0;}
.page-btn{padding:9px 16px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);
  font-family:'Sarabun';font-size:.88rem;font-weight:700;cursor:pointer;transition:.15s;}
.page-btn:hover,.page-btn.active{background:var(--ink);color:var(--gold-bright);border-color:var(--ink);}

/* ── FOOTER ── */
footer{background:var(--ink);color:rgba(255,255,255,.72);padding:38px 26px 30px;margin-top:48px;
  position:relative;overflow:hidden;}
footer::before{content:"✦";position:absolute;right:-40px;bottom:-80px;font-size:10rem;
  color:rgba(243,172,46,.08);pointer-events:none;line-height:1;}
.footer-inner{max-width:1120px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;position:relative;}
.footer-logo{font-family:'Pridi',serif;font-size:1.12rem;font-weight:700;color:#fff;}
.footer-links{display:flex;gap:22px;font-size:.9rem;flex-wrap:wrap;}
.footer-links a{transition:color .15s;}
.footer-links a:hover{color:var(--gold-bright);}

/* ── LOADING & EMPTY ── */
.loading{text-align:center;padding:64px;color:var(--slate);}
.empty{text-align:center;padding:64px;color:var(--slate);}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--line);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--slate);font-size:.9rem;
  margin-bottom:18px;cursor:pointer;transition:.15s;font-weight:600;}
.back-btn:hover{color:var(--ink);}

/* ── RESPONSIVE ── */
@media(max-width:880px){
  .crown{padding:26px 0 46px;}
  .crown-grid{grid-template-columns:1fr;gap:26px;}
  .stamp{width:54px;height:54px;top:-30px;right:0;}
  .stamp b{font-size:1.05rem;}
  .stamp small{font-size:.5rem;}
}
@media(max-width:768px){
  .arts-grid{grid-template-columns:repeat(2,1fr);}
  .form-row{grid-template-columns:1fr;}
  .apps-box{padding:28px 18px;border-radius:20px;}
  .page-head::after{font-size:5rem;}
}
@media(max-width:480px){
  .arts-grid{grid-template-columns:1fr;}
  .apps-grid{grid-template-columns:1fr;}
  .sec-title{font-size:1.3rem;}
}
@media(hover:none) and (pointer:coarse){
  .btn-open,.btn-pmt{padding:12px 0;font-size:.9rem;}
  .btn-copy{padding:9px 4px;}
  .btn{padding:13px 24px;}
  .nav-links a{padding:11px 16px;}
  .cat-pill{padding:9px 17px;}
  .page-btn{padding:11px 17px;}
  .back-btn{padding:8px 0;}
  .sec-more{padding:6px 0;}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

`;

'use strict';
const API    = '/api';
const tok    = () => localStorage.getItem('_admtok');
const myRole = () => localStorage.getItem('_role') || 'super_admin';
const myName = () => localStorage.getItem('_display_name') || 'Admin';
const myUid  = () => localStorage.getItem('_uid') || '0';
const hdr    = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok() });

const api = {
  get:    url       => fetch(API+url, { headers: hdr(), cache: 'no-store' }).then(r=>r.json()),
  post:   (url,b)   => fetch(API+url, { method:'POST',   headers: hdr(), body: JSON.stringify(b) }).then(r=>r.json()),
  put:    (url,b)   => fetch(API+url, { method:'PUT',    headers: hdr(), body: JSON.stringify(b) }).then(r=>r.json()),
  delete: url       => fetch(API+url, { method:'DELETE', headers: hdr() }).then(r=>r.json()),
};

// ── AUTH ──────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('usernameInput').value.trim();
  const pw       = document.getElementById('pwdInput').value;
  const body     = username ? { username, password: pw } : { password: pw };
  const res = await fetch(API+'/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  }).then(r=>r.json());
  if (res.token) {
    localStorage.setItem('_admtok', res.token);
    localStorage.setItem('_role', res.role || 'super_admin');
    localStorage.setItem('_display_name', res.display_name || 'Admin');
    localStorage.setItem('_username', res.username || 'admin');
    localStorage.setItem('_uid', res.user_id || '0');
    showAdmin(); applyRole(); nav('dash');
  } else {
    document.getElementById('loginAlert').innerHTML =
      `<div class="alert alert-danger">❌ ${res.error||'รหัสผ่านไม่ถูกต้อง'}</div>`;
  }
}

async function doLogout() {
  await fetch(API+'/auth/logout', { method:'POST', headers: hdr() });
  ['_admtok','_role','_display_name','_username','_uid'].forEach(k=>localStorage.removeItem(k));
  showLogin();
}

function applyRole() {
  const isAdmin = myRole() === 'super_admin';
  document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? '' : 'none');
  const sideUser = document.getElementById('sideUser');
  if (sideUser) {
    const badge = isAdmin
      ? '<span style="background:#fef3c7;color:#92400e;padding:1px 7px;border-radius:100px;font-size:.7rem;font-weight:700;">admin</span>'
      : '<span style="background:#eff6ff;color:#1d4ed8;padding:1px 7px;border-radius:100px;font-size:.7rem;font-weight:700;">editor</span>';
    sideUser.innerHTML = myName() + ' ' + badge;
  }
}

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  document.getElementById('mobileHeader').style.display = 'none';
}

function showAdmin() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('sidebar').style.display = 'block';
  document.getElementById('content').style.display = 'block';
  document.getElementById('mobileHeader').style.display = 'flex';
}

// ── NAVIGATION ────────────────────────────────────────────
let currentPage = '';
function nav(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page===page));
  document.getElementById('sidebar').classList.remove('open');
  const c = document.getElementById('content');
  c.innerHTML = `<div class="empty-state"><div class="spinner2"></div></div>`;

  if (page==='comments')     renderComments();

async function editArticle(id) {
  currentPage = 'new-article';
  document.getElementById('sidebar').classList.remove('open');
  const full = await api.get('/articles/admin/' + id);
  if (full.error) { toast('❌ '+full.error); return; }
  renderArticleEditor(full);
}

async function delArticle(id, title) {
  if (!confirm(`ลบบทความ "${title}" ?\n\nการลบนี้ไม่สามารถย้อนกลับได้`)) return;
  await api.delete('/articles/'+id);
  toast('🗑 ลบบทความแล้ว');
  renderArticles();
}

// cache CSS ที่ fetch มาจาก index.html จริง
let _pvCSSCache = null;

async function previewArticle() {
  const title   = (document.getElementById('artTitle')?.value || '').trim() || '(ยังไม่ได้ใส่หัวข้อ)';
  const cat     = document.getElementById('artCat')?.value || '';

  const author  = myName();
  const today   = new Date().toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'});
  const esc = s => String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

  const statusBadge = pub
    ? '<span style="background:#dcfce7;color:#15803d;padding:3px 12px;border-radius:100px;font-size:.78rem;font-weight:700;">✅ จะเผยแพร่</span>'
    : '<span style="background:#fef3e2;color:#c2660c;padding:3px 12px;border-radius:100px;font-size:.78rem;font-weight:700;">📋 แบบร่าง (ดูตัวอย่าง)</span>';

  // ดึง CSS จาก index.html จริงตอน runtime — sync กับเว็บจริงเสมอ
  if (!_pvCSSCache) {
    try {
      const resp = await fetch(location.origin + '/');
      const txt  = await resp.text();
      const m    = txt.match(/<style>([\s\S]*?)<\/style>/);
      _pvCSSCache = m ? m[1] : PREVIEW_CSS;
    } catch { _pvCSSCache = PREVIEW_CSS; }
  }
  const LIVE_CSS = _pvCSSCache;

  const html = `<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตัวอย่าง: ${esc(title)}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pridi:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
${LIVE_CSS}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Pridi',serif;font-weight:600;line-height:1.35;}
a{color:var(--mint);}
.pv-bar{background:#15223c;color:#fff;padding:10px 22px;font-family:'Sarabun';font-size:.85rem;
  display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10;}
.pv-bar b{color:#f0a830;}
.pv-bar button{background:#f0a830;color:#15223c;border:none;padding:7px 16px;border-radius:8px;
  font-family:'Sarabun';font-weight:700;font-size:.82rem;cursor:pointer;}
.art-info{display:flex;gap:13px;align-items:center;flex-wrap:wrap;margin-bottom:28px;
  padding-bottom:20px;border-bottom:1px solid var(--line);font-size:.85rem;color:var(--slate);}
.cat-tag{background:#ebf0fa;color:#3a5a9b;padding:3px 12px;border-radius:100px;font-size:.73rem;font-weight:700;}
</style></head>
<body>
<div class="pv-bar">
  <span>👁 โหมดดูตัวอย่าง — นี่คือหน้าตาบทความเมื่อเผยแพร่จริง</span>
  <button onclick="window.close()">✕ ปิดหน้าต่าง</button>
</div>
<div class="art-wrap">
  <h1>${esc(title)}</h1>
  <div class="art-info">
    <span class="cat-tag">${esc(cat)}</span>
    <span>📅 ${today}</span>
    <span>✍️ ${esc(author)}</span>
    ${statusBadge}
  </div>
  <div class="art-body">${body}</div>
</div>
</body></html>`;

  const w = window.open('', '_blank', 'width=820,height=900,scrollbars=yes');
  if (!w) { toast('❌ เบราว์เซอร์บล็อกป๊อปอัป — กรุณาอนุญาต popup สำหรับเว็บนี้'); return; }
  w.document.write(html);
  w.document.close();
}

// วาง HTML ดิบ (ตาราง/รูปแบบ) ให้แสดงผลจริง — ไม่ห่อ <pre>
function insertHTML() {
  document.getElementById('modal').innerHTML = `
  <div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:640px;">
      <h3>⧉ วางโค้ด HTML</h3>
      <p style="font-size:.85rem;color:#64748b;margin-bottom:6px;">
        วางโค้ด HTML ที่ได้มา (เช่น ตาราง <code style="background:#f1f5f9;padding:1px 5px;border-radius:4px;">&lt;table&gt;</code> การ์ด กล่องสี ฯลฯ)
        ระบบจะแทรกเข้าบทความให้แสดงผลเป็นของจริง ไม่ใช่ตัวอักษรโค้ด
      </p>
      <textarea class="form-input" id="htmlInput" rows="12" autofocus
        style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.85rem;line-height:1.6;resize:vertical;"
        placeholder="&lt;table&gt;\n  &lt;tr&gt;&lt;th&gt;หัวตาราง&lt;/th&gt;&lt;/tr&gt;\n  &lt;tr&gt;&lt;td&gt;ข้อมูล&lt;/td&gt;&lt;/tr&gt;\n&lt;/table&gt;"></textarea>
      <div style="display:flex;align-items:center;gap:8px;margin:10px 0 4px;font-size:.82rem;color:#64748b;">
        <span>👁 ดูตัวอย่างก่อนแทรก:</span>
      </div>
      <div id="htmlPreview" style="border:1px solid #e2e8f0;border-radius:10px;padding:14px;min-height:60px;
        background:#faf7f1;font-size:.9rem;max-height:240px;overflow:auto;">
        <span style="color:#94a3b8;">— ตัวอย่างจะแสดงที่นี่เมื่อพิมพ์ —</span>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
        <button class="btn btn-primary" onclick="doInsertHTML()">⧉ แทรกลงบทความ</button>
      </div>
    </div>
  </div>`;
  const ta = document.getElementById('htmlInput');
  const pv = document.getElementById('htmlPreview');
  const update = () => {
    const v = ta.value.trim();
    pv.innerHTML = v
      ? `<div class="art-body">${v}</div>`
      : '<span style="color:#94a3b8;">— ตัวอย่างจะแสดงที่นี่เมื่อพิมพ์ —</span>';
  };
  ta.addEventListener('input', update);
}

function doInsertHTML() {
  const html = document.getElementById('htmlInput').value.trim();
  if (!html) { closeModal(); return; }
  closeModal();
  const ed = document.getElementById('editorBody');
  ed.focus();
  // ลบ placeholder เริ่มต้นถ้ายังอยู่
  if (ed.innerHTML.trim() === '<p>เริ่มพิมพ์เนื้อหาที่นี่...</p>') ed.innerHTML = '';
  // แทรกเป็น HTML จริง ณ ตำแหน่งเคอร์เซอร์ (หรือต่อท้ายถ้าไม่มี selection)
  const sel = window.getSelection();
  if (sel && sel.rangeCount && ed.contains(sel.anchorNode)) {
    document.execCommand('insertHTML', false, html + '<p><br></p>');
  } else {
    ed.innerHTML += html + '<p><br></p>';
  }
  toast('✅ แทรก HTML แล้ว — กด 👁 ดูตัวอย่างเพื่อตรวจ');
}
function fmtLink()  {
  const url = prompt('กรอก URL ลิงก์:');
  if (url) { document.execCommand('createLink', false, url); document.getElementById('editorBody').focus(); }
}

function switchImgTab(tab) {
  const isUpload = tab === 'upload';
  document.getElementById('imgPanelUpload').style.display = isUpload ? '' : 'none';
  document.getElementById('imgPanelUrl').style.display    = isUpload ? 'none' : '';
  const tu = document.getElementById('imgTabUpload');
  const tl = document.getElementById('imgTabUrl');
  tu.style.borderBottomColor = isUpload ? '#2563eb' : 'transparent';
  tu.style.color = isUpload ? '#2563eb' : '#64748b';
  tl.style.borderBottomColor = isUpload ? 'transparent' : '#2563eb';
  tl.style.color = isUpload ? '#64748b' : '#2563eb';
  if (!isUpload) setTimeout(() => document.getElementById('imgUrlInput')?.focus(), 50);
}

function previewImgFile(input) {
  const f = input.files[0];
  if (!f) return;
  const pv = document.getElementById('imgUploadPreview');
  const thumb = document.getElementById('imgUploadThumb');
  const name = document.getElementById('imgUploadName');
  thumb.src = URL.createObjectURL(f);
  name.textContent = f.name + ' (' + (f.size / 1024).toFixed(0) + ' KB)';
  pv.style.display = '';
  // เปิด label เพื่อให้ช่อง input trigger ได้
  input.closest('label').style.display = 'none';
}

function previewImgUrl(url) {
  const pv = document.getElementById('imgUrlPreview');
  const thumb = document.getElementById('imgUrlThumb');
  if (url.startsWith('http')) {
    thumb.src = url;
    pv.style.display = '';
  } else {
    pv.style.display = 'none';
  }
}

async function doInsertImg() {
  const alt      = (document.getElementById('imgAltInput')?.value || 'รูปภาพ').trim();
  const urlInput = document.getElementById('imgUrlInput')?.value.trim();
  const fileInput = document.getElementById('imgFileInput');
  const panelUrl  = document.getElementById('imgPanelUrl');
  const isUrl = panelUrl && panelUrl.style.display !== 'none';

  // helper: restore cursor แล้วแทรก HTML เข้า editor
  function insertIntoEditor(imgHTML) {
    const ed = document.getElementById('editorBody');
    if (!ed) return;
    if (ed.innerHTML.trim() === '<p>เริ่มพิมพ์เนื้อหาที่นี่...</p>') ed.innerHTML = '';
    ed.focus();
    // restore cursor ที่บันทึกไว้ก่อนเปิด modal
    if (window._imgSavedRange) {
      try {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(window._imgSavedRange);
      } catch(e) { /* range stale — ใช้ fallback */ }
    }
    // ลอง execCommand (ทำงานเมื่อมี selection)
    const ok = document.execCommand('insertHTML', false, imgHTML + '<p><br></p>');
    if (!ok) {
      // fallback: ต่อท้าย innerHTML ถ้า execCommand ล้มเหลว
      ed.innerHTML += imgHTML + '<p></p>';
    }
    window._imgSavedRange = null;
  }

  if (isUrl) {
    if (!urlInput) { toast('❌ กรุณาใส่ URL รูปภาพ'); return; }
    closeModal();
    insertIntoEditor(`<img src="${urlInput}" alt="${alt}" style="max-width:100%;border-radius:8px;margin:8px 0;">`);
    toast('✅ แทรกรูปจาก URL แล้ว');
  } else {
    const f = fileInput?.files?.[0];
    if (!f) { toast('❌ กรุณาเลือกไฟล์รูปก่อน'); return; }
    closeModal();
    toast('⏳ กำลังอัปโหลดรูป...');
    try {
      const url = await uploadToImgbb(f);
      if (url) {
        insertIntoEditor(`<img src="${url}" alt="${alt}" style="max-width:100%;border-radius:8px;margin:8px 0;">`);
        toast('✅ แทรกรูปแล้ว');
      }
    } catch(e) { toast('❌ ' + e.message); }
  }
}

// ── UPLOAD ตรงไปที่ imgbb (ไม่ผ่าน Cloudflare proxy — เสถียรกว่า) ─────────
let _imgbbKey = null;  // cache key ใน session
async function getImgbbKey() {
  if (_imgbbKey) return _imgbbKey;
  const s = await api.get('/settings');
  _imgbbKey = s.imgbb_key || '';
  return _imgbbKey;
}
async function uploadToImgbb(file) {
  const key = await getImgbbKey();
  if (!key) { alert('⚠️ ยังไม่ได้ตั้งค่า imgbb API Key\nไปที่ ตั้งค่าเว็บ → imgbb API Key ก่อนครับ'); return null; }
  const fd = new FormData(); fd.append('image', file);
  const r = await fetch(`https://api.imgbb.com/1/upload?key=${key}`, { method:'POST', body:fd }).then(x=>x.json());
  if (r.success && r.data?.url) return r.data.url;
  throw new Error(r.error?.message || 'อัปโหลดไม่สำเร็จ');
}

async function saveApp(id) {
  const title = document.getElementById('aTitle').value.trim();
  if (!title) { alert('กรุณาใส่ชื่อแอป'); return; }
  const locked = document.getElementById('aLocked').checked;
  const body = {
    icon: document.getElementById('aIcon').value || '🎮',
    title,
    category: document.getElementById('aCat').value.trim() || 'อื่นๆ',
    description: document.getElementById('aDesc').value.trim(),
    url: document.getElementById('aUrl').value.trim(),
    preview_image: document.getElementById('aPreview').value.trim(),
    prompt: document.getElementById('aPrompt').value,
    visible: document.getElementById('aVisible').checked,
    locked: locked,
    lock_code: locked ? (document.getElementById('aLockCode').value.trim()) : '',
  };
  const res = id && id !== 'null'
    ? await api.put('/apps/'+id, body)
    : await api.post('/apps', body);
  if (res.error) { toast('❌ '+res.error); return; }
  closeModal(); toast('✅ บันทึกแอปแล้ว');
  renderApps();
}

async function delApp(id, title) {

  await api.delete('/apps/'+id);

}

async function renderCodes() {

    if (arr.includes('all')) return '🌟 ทุกแอปที่ล็อก';
    return arr.map(id => {

    if (!exp) return '<span style="color:#059669;font-weight:700;">ไม่หมดอายุ</span>';
    const d = new Date(exp), now = new Date();
    if (d < now) return '<span style="color:#dc2626;font-weight:700;">หมดอายุแล้ว</span>';

  <div class="card">

    <table>
      <thead><tr><th>รหัส</th><th>ชื่อแพ็กเกจ</th><th>ปลดล็อก</th><th>หมดอายุ</th><th>สถานะ</th><th>จัดการ</th></tr></thead>

        ${codeList.length ? codeList.map(c=>`<tr style="${!c.active?'opacity:.5;':''}">
          <td><code style="background:#f1f5f9;padding:3px 8px;border-radius:5px;font-weight:700;letter-spacing:1px;">${c.code}</code></td>

          <td>${expLabel(c.expires_at)}</td>
          <td>${c.active
            ? '<span class="badge badge-green">✅ ใช้งานได้</span>'
            : '<span class="badge badge-gray">⏸ ปิดใช้งาน</span>'}</td>
          <td style="white-space:nowrap;">
            <button class="btn btn-outline btn-sm" title="สร้างอีเมลส่งรหัสให้ลูกค้า" onclick="openEmailModal(${c.id})">📧</button>
            <button class="btn btn-outline btn-sm" style="margin-left:4px;" onclick="openCodeModal(${c.id})">✏️</button>
            <button class="btn btn-danger btn-sm" style="margin-left:4px;" onclick="delCode(${c.id},'${c.code}')">🗑</button>
          </td>
        </tr>`).join('')

      </tbody>
    </table>
    </div>
  </div>

    <div class="card-title" style="font-size:.9rem;">💡 วิธีใช้งาน</div>

              <input type="checkbox" id="cAll" ${appIds.includes('all')?'checked':''}
                onchange="document.getElementById('cAppList').style.opacity=this.checked?.3:1;document.querySelectorAll('.cAppCb').forEach(cb=>cb.disabled=this.checked)">
              🌟 ปลดทุกแอปที่ล็อก (VIP)
            </label>
            <div id="cAppList" style="opacity:${appIds.includes('all')?.3:1};display:flex;flex-direction:column;gap:6px;">
              ${lockedApps.length
                ? lockedApps.map(a=>`<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.9rem;">
                    <input type="checkbox" class="cAppCb" value="${a.id}"
                      ${(appIds.includes(a.id)||appIds.includes(String(a.id)))?'checked':''}

                    ${a.icon} ${a.title}
                  </label>`).join('')
                : '<span style="color:#94a3b8;font-size:.85rem;">ยังไม่มีแอปที่ล็อก</span>'

          <span>เปิดใช้งานรหัสนี้</span>
        </label>
        <div class="modal-footer">

async function saveCode(id) {
  const code  = document.getElementById('cCode').value.trim();
  const label = document.getElementById('cLabel').value.trim();
  if (!code || !label) { alert('กรุณาใส่รหัสและชื่อแพ็กเกจ'); return; }
  const allChecked = document.getElementById('cAll').checked;
  let appIds = allChecked ? ['all'] : [];
  if (!allChecked) {
    document.querySelectorAll('.cAppCb:checked').forEach(cb => appIds.push(parseInt(cb.value)));
  }
  const body = {
    code, label, app_ids: appIds,
    expires_at: document.getElementById('cExpiry').value || null,
    active: document.getElementById('cActive').checked,
  };
  const res = id && id !== 'null'
    ? await api.put('/codes/'+id, body)
    : await api.post('/codes', body);
  if (res.error) { toast('❌ '+res.error); return; }
  closeModal(); toast('✅ บันทึกรหัสแล้ว');
  renderCodes();
}

async function delCode(id, code) {
  if (!confirm(`ลบรหัส "${code}" ?`)) return;
  await api.delete('/codes/'+id);
  toast('🗑 ลบรหัสแล้ว'); renderCodes();
}

async function copyEmail() {
  const btn = document.getElementById('emCopyBtn');
  const html = buildEmailHTML();
  const plain = 'รหัสปลดล็อกของคุณ: ' + document.getElementById('emCode').value
    + '\nใช้งานที่ ' + location.origin + '/#/apps';
  try {
    // วิธีหลัก: ClipboardItem แบบ text/html → วางใน Gmail ติด format เต็ม
    await navigator.clipboard.write([
      new ClipboardItem({
        'text/html':  new Blob([html],  { type: 'text/html' }),
        'text/plain': new Blob([plain], { type: 'text/plain' }),
      })
    ]);
    btn.textContent = '✅ คัดลอกแล้ว — ไปวางใน Gmail ได้เลย';
    setTimeout(() => btn.textContent = '📋 คัดลอกอีเมล (วางใน Gmail)', 2500);
  } catch (e) {
    // fallback: execCommand บน div ชั่วคราว (เบราว์เซอร์เก่า)
    const tmp = document.createElement('div');
    tmp.contentEditable = 'true';
    tmp.style.cssText = 'position:fixed;left:-9999px;top:0;';
    tmp.innerHTML = html;
    document.body.appendChild(tmp);
    const range = document.createRange();
    range.selectNodeContents(tmp);
    const sel = getSelection();
    sel.removeAllRanges(); sel.addRange(range);
    const ok = document.execCommand('copy');
    sel.removeAllRanges(); tmp.remove();
    if (ok) {
      btn.textContent = '✅ คัดลอกแล้ว — ไปวางใน Gmail ได้เลย';
      setTimeout(() => btn.textContent = '📋 คัดลอกอีเมล (วางใน Gmail)', 2500);
    } else {
      toast('❌ คัดลอกไม่สำเร็จ — ลองใช้ปุ่มดูตัวอย่างแล้วคัดลอกเอง');
    }
  }
}

async function uploadPreviewImg() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = async () => {
    const f = inp.files[0]; if (!f) return;
    const btn = document.querySelector('[onclick="uploadPreviewImg()"]');
    if (btn) btn.textContent = '⏳ กำลังอัปโหลด...';
    try {
      const url = await uploadToImgbb(f);
      if (!url) { if (btn) btn.textContent = '📷 อัปโหลด'; return; }
      document.getElementById('aPreview').value = url;
      let img = document.querySelector('.preview-thumb');
      if (!img) {
        img = document.createElement('img'); img.className='preview-thumb';
        img.style='margin-top:8px;width:100%;max-height:120px;object-fit:cover;border-radius:8px;';
        document.getElementById('aPreview').parentNode.appendChild(img);
      }
      img.src = url;
      toast('✅ อัปโหลดรูป preview แล้ว');
    } catch(e) { toast('❌ ' + e.message); }
    if (btn) btn.textContent = '📷 อัปโหลด';
  };
  inp.click();
}

async function saveUser(id) {
  const un   = document.getElementById('uUsername').value.trim();
  const dn   = document.getElementById('uDisplayName').value.trim();
  const pw   = document.getElementById('uPassword').value;
  const role = document.getElementById('uRole').value;
  if (!dn || (!id && (!un || !pw))) { alert('กรุณาใส่ข้อมูลให้ครบ'); return; }
  const body = { username:un, display_name:dn, role };
  if (pw) body.password = pw;
  const r = id && id!=='null'
    ? await api.put('/users/'+id, body)
    : await api.post('/users', body);
  if (r.error) { toast('❌ '+r.error); return; }
  closeModal(); toast('✅ บันทึกแล้ว'); renderUsers();
}

async function delUser(id, name) {
  if (!confirm(`ลบผู้ใช้ "${name}" ?`)) return;
  const r = await api.delete('/users/'+id);
  if (r.error) { toast('❌ '+r.error); return; }
  toast('🗑 ลบแล้ว'); renderUsers();
}

async function saveProfile() {
  const dn   = document.getElementById('pDisplayName').value.trim();
  const pwd  = document.getElementById('pPwd').value;
  const pwd2 = document.getElementById('pPwd2').value;
  if (!dn) { alert('กรุณาใส่ชื่อที่แสดง'); return; }
  if (pwd && pwd !== pwd2) { toast('❌ รหัสผ่านไม่ตรงกัน'); return; }
  const uid = myUid();
  let r;
  if (uid === '0') {
    // Admin หลัก — บันทึกผ่าน settings
    const body = { author_name: dn };
    if (pwd) body.admin_password = pwd;
    r = await api.put('/settings', body);
  } else {
    const body = { display_name: dn };
    if (pwd) body.password = pwd;
    r = await api.put('/users/'+uid, body);
  }
  if (r.ok || !r.error) {
    localStorage.setItem('_display_name', dn);
    applyRole();
    toast('✅ บันทึกโปรไฟล์แล้ว');

function getCatList() { return window._cats || []; }
function renderCatList() {
  const cats = getCatList();
  document.getElementById('catList').innerHTML = cats.map((c,i)=>
    `<span style="display:inline-flex;align-items:center;gap:6px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;padding:5px 12px;border-radius:100px;font-size:.88rem;font-weight:700;">
      ${c}<button onclick="removeCat(${i})" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:.9rem;padding:0;line-height:1;">✕</button>
    </span>`
  ).join('');
}
function addCat() {
  const inp = document.getElementById('newCatInput');
  const v = inp.value.trim();
  if (!v || getCatList().includes(v)) return;
  window._cats.push(v);
  renderCatList();
  inp.value = '';
}
function removeCat(i) {
  window._cats.splice(i, 1);
  renderCatList();
}

async function saveSettings() {
  const pwd  = document.getElementById('sNewPwd').value;
  const pwd2 = document.getElementById('sNewPwd2').value;

  const body = {
    site_title:  document.getElementById('sTitle').value,
    author_name: document.getElementById('sAuthor').value,
    site_tagline:document.getElementById('sTagline').value,
    site_desc:   document.getElementById('sDesc').value,
    imgbb_key:   document.getElementById('sImgbb').value,
    adsense_id:  document.getElementById('sAdsense').value,
    article_categories: JSON.stringify(getCatList()),
  };
  if (pwd) body.admin_password = pwd;
  const res = await api.put('/settings', body);
  if (res.ok) { _imgbbKey = null; toast('✅ บันทึกการตั้งค่าแล้ว'); }
  else toast('❌ '+(res.error||'เกิดข้อผิดพลาด'));
}

// ── UTILS ─────────────────────────────────────────────────
function closeModal() { document.getElementById('modal').innerHTML = ''; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  const t = tok();
  if (t) {
    const check = await fetch(API+'/auth/check', { headers: hdr() }).then(r=>r.json()).catch(()=>({authenticated:false}));
    if (check.authenticated) {
      // อัปเดต role/displayName จาก server
      if (check.role) localStorage.setItem('_role', check.role);
      if (check.display_name) localStorage.setItem('_display_name', check.display_name);
      if (check.username) localStorage.setItem('_username', check.username);
      showAdmin(); applyRole();
      const s = await api.get('/settings').catch(()=>({}));
      if (s.site_title) document.getElementById('sideTitle').textContent = '✦ '+s.site_title;
      if (s.article_categories) localStorage.setItem('_cats', s.article_categories);
      nav('dash');
    } else {
      localStorage.removeItem('_admtok');
      showLogin();
    }
  } else {
    showLogin();
  }
}
