function codeAppNames(ids) {
  if (!ids) return '-';
  let arr = []; try { arr = JSON.parse(ids); } catch {}
  if (arr.includes('all')) return '🌟 ทุกแอปที่ล็อก';
  return arr.map(id => {
    const a = (window._codesApps||[]).find(x=>x.id===parseInt(id)||x.id===id);
    return a ? a.icon+' '+a.title : id;
  }).join(', ') || '-';
}
function codeExpLabel(exp) {
  if (!exp) return '<span style="color:#059669;font-weight:700;">ไม่หมดอายุ</span>';
  const d = new Date(exp), now = new Date();
  if (d < now) return '<span style="color:#dc2626;font-weight:700;">หมดอายุแล้ว</span>';
  return '<span style="color:#d97706;font-weight:700;">'+d.toLocaleDateString('th-TH')+'</span>';
}
function codeIsExpired(c) {
  return !!(c.expires_at && new Date(c.expires_at) < new Date());
}
function codeIsAllApps(c) {
  let arr = []; try { arr = JSON.parse(c.app_ids||'[]'); } catch {}
  let ws  = []; try { ws  = JSON.parse(c.worksheet_ids||'[]'); } catch {}
  return arr.includes('all') || ws.includes('all');
}

function codeRowsHtml(arr) {
  if (!arr.length) return `<tr><td colspan="6" style="text-align:center;padding:32px;color:#94a3b8;">ไม่พบรหัสที่ตรงกับเงื่อนไข</td></tr>`;
  return arr.map(c=>`<tr style="${!c.active?'opacity:.5;':''}">
    <td><code style="background:#f1f5f9;padding:3px 8px;border-radius:5px;font-weight:700;letter-spacing:1px;">${c.code}</code></td>
    <td><strong>${c.label}</strong></td>
    <td style="font-size:.82rem;max-width:200px;">${codeAppNames(c.app_ids)}</td>
    <td>${codeExpLabel(c.expires_at)}</td>
    <td>${c.active
      ? '<span class="badge badge-green">✅ ใช้งานได้</span>'
      : '<span class="badge badge-gray">⏸ ปิดใช้งาน</span>'}</td>
    <td style="white-space:nowrap;">
      <button class="btn btn-outline btn-sm" title="สร้างอีเมลส่งรหัสให้ลูกค้า" onclick="openEmailModal(${c.id})">📧</button>
      <button class="btn btn-outline btn-sm" style="margin-left:4px;" title="ร่างข้อความ Messenger ส่งรหัสให้ลูกค้า" onclick="openMsgrModal(${c.id})">💬</button>
      <button class="btn btn-outline btn-sm" style="margin-left:4px;" onclick="openCodeModal(${c.id})">✏️</button>
      <button class="btn btn-danger btn-sm" style="margin-left:4px;" onclick="delCode(${c.id},'${String(c.code).replace(/'/g,"\\'")}')">🗑</button>
    </td>
  </tr>`).join('');
}

function setCodeStatus(st) {
  window._codesFlt.status = st;
  document.querySelectorAll('.flt-chip[data-st]').forEach(c=>c.classList.toggle('on', c.dataset.st===st));
  filterCodes();
}

function filterCodes() {
  const q  = (document.getElementById('codeSearch')?.value || '').trim().toLowerCase();
  const st = window._codesFlt.status;
  const clr = document.getElementById('codeSearchClr'); if (clr) clr.style.display = q ? 'block' : 'none';
  const out = (window._codesAll||[]).filter(c=>{
    if (q && !(c.code||'').toLowerCase().includes(q) && !(c.label||'').toLowerCase().includes(q)) return false;
    if (st==='active'  && (!c.active || codeIsExpired(c))) return false;
    if (st==='off'     &&  c.active) return false;
    if (st==='expired' && !codeIsExpired(c)) return false;
    if (st==='allapps' && !codeIsAllApps(c)) return false;
    return true;
  });
  document.getElementById('codesBody').innerHTML = codeRowsHtml(out);
  const cnt = document.getElementById('codeCount');
  if (cnt) cnt.textContent = `${out.length} / ${(window._codesAll||[]).length} รหัส`;
}

// สลับช่องกำหนดวันเอง + ปรับ hint ตาม dropdown
function onDurationChange() {
  const dur = document.getElementById('cDuration').value;
  const exp = document.getElementById('cExpiry');
  const hint = document.getElementById('cDurationHint');
  if (dur === 'custom') {
    exp.style.display = '';
    hint.textContent = 'เลือกวันและเวลาที่ต้องการให้รหัสหมดอายุ';
  } else {
    exp.style.display = 'none';
    hint.textContent = dur
      ? 'นับจากเวลาที่กดบันทึก — เช่น เลือก 7 วัน รหัสจะหมดอายุอีก 7 วันข้างหน้าพอดี (รวมเวลา ไม่ใช่แค่สิ้นวัน)'
      : 'รหัสนี้จะใช้ได้ตลอด ไม่มีวันหมดอายุ';
  }
}

async function saveCode(id) {
  const code  = document.getElementById('cCode').value.trim();
  const label = document.getElementById('cLabel').value.trim();
  if (!code || !label) { alert('กรุณาใส่รหัสและชื่อแพ็กเกจ'); return; }
  const allChecked = document.getElementById('cAll').checked;
  let appIds = allChecked ? ['all'] : [];
  if (!allChecked) {
    document.querySelectorAll('.cAppCb:checked').forEach(cb => appIds.push(parseInt(cb.value)));
  }
  const wsAllChecked = document.getElementById('cWsAll').checked;
  let wsIds = wsAllChecked ? ['all'] : [];
  if (!wsAllChecked) {
    document.querySelectorAll('.cWsCb:checked').forEach(cb => wsIds.push(parseInt(cb.value)));
  }
  // คำนวณวันหมดอายุจาก dropdown อายุ หรือกำหนดเอง
  const dur = document.getElementById('cDuration').value;
  let expires_at = null;
  if (dur === 'custom') {
    const v = document.getElementById('cExpiry').value;
    expires_at = v ? new Date(v).toISOString() : null;
  } else if (dur) {
    // now + N วัน (รวมเวลาเต็ม ไม่ใช่แค่สิ้นวัน)
    expires_at = new Date(Date.now() + parseInt(dur) * 86400000).toISOString();
  }
  const body = {
    code, label, app_ids: appIds, worksheet_ids: wsIds,
    expires_at,
    active: document.getElementById('cActive').checked,
  };
  const res = id && id !== 'null'
    ? await api.put('/codes/'+id, body)
    : await api.post('/codes', body);
  if (res.error) { toast('❌ '+res.error); return; }
  closeModal(); toast('✅ บันทึกรหัสแล้ว');
  renderCodes();
}

async function delCode(id, code) {
  if (!confirm(`ลบรหัส "${code}" ?`)) return;
  await api.delete('/codes/'+id);
  toast('🗑 ลบรหัสแล้ว'); renderCodes();
}

async function copyEmail() {
  const btn = document.getElementById('emCopyBtn');
  const html = buildEmailHTML();
  const plain = 'รหัสปลดล็อกของคุณ: ' + document.getElementById('emCode').value
    + '\nใช้งานที่ ' + location.origin + '/';
  try {
    // วิธีหลัก: ClipboardItem แบบ text/html → วางใน Gmail ติด format เต็ม
    await navigator.clipboard.write([
      new ClipboardItem({
        'text/html':  new Blob([html],  { type: 'text/html' }),
        'text/plain': new Blob([plain], { type: 'text/plain' }),
      })
    ]);
    btn.textContent = '✅ คัดลอกแล้ว — ไปวางใน Gmail ได้เลย';
    setTimeout(() => btn.textContent = '📋 คัดลอกอีเมล (วางใน Gmail)', 2500);
  } catch (e) {
    // fallback: execCommand บน div ชั่วคราว (เบราว์เซอร์เก่า)
    const tmp = document.createElement('div');
    tmp.contentEditable = 'true';
    tmp.style.cssText = 'position:fixed;left:-9999px;top:0;';
    tmp.innerHTML = html;
    document.body.appendChild(tmp);
    const range = document.createRange();
    range.selectNodeContents(tmp);
    const sel = getSelection();
    sel.removeAllRanges(); sel.addRange(range);
    const ok = document.execCommand('copy');
    sel.removeAllRanges(); tmp.remove();
    if (ok) {
      btn.textContent = '✅ คัดลอกแล้ว — ไปวางใน Gmail ได้เลย';
      setTimeout(() => btn.textContent = '📋 คัดลอกอีเมล (วางใน Gmail)', 2500);
    } else {
      toast('❌ คัดลอกไม่สำเร็จ — ลองใช้ปุ่มดูตัวอย่างแล้วคัดลอกเอง');
    }
  }
}

// อัปเดตช่องตัวอย่างตามที่พิมพ์ (ใช้ .value → ปลอดภัย ไม่ใช่ innerHTML)
function refreshMsgr() {
  const ta = document.getElementById('mgPreview');
  if (ta) ta.value = buildMsgrText();
}

async function copyMsgr() {
  const btn = document.getElementById('mgCopyBtn');
  const text = buildMsgrText();
  const done = () => { btn.textContent = '✅ คัดลอกแล้ว — วางใน Messenger ได้เลย'; setTimeout(() => btn.textContent = '📋 คัดลอกข้อความ', 2500); };
  try {
    await navigator.clipboard.writeText(text);
    done();
  } catch (e) {
    // fallback: เลือกข้อความในกล่องตัวอย่างแล้ว execCommand (เบราว์เซอร์เก่า/สิทธิ์ clipboard ไม่ผ่าน)
    const ta = document.getElementById('mgPreview');
    if (ta) {
      ta.removeAttribute('readonly'); ta.focus(); ta.select();
      const ok = document.execCommand('copy');
      ta.setAttribute('readonly', ''); ta.blur();
      if (ok) { done(); return; }
    }
    toast('❌ คัดลอกไม่สำเร็จ — เลือกข้อความในกล่องแล้วคัดลอกเอง');
  }
}

// สลับการแสดง permission section ตาม role ที่เลือก
function togglePermSection() {
  const role = document.getElementById('uRole').value;
  const show = role !== 'super_admin';
  const permSec = document.getElementById('permSection');
  const labelGrp = document.getElementById('roleLabelGroup');
  if (permSec) permSec.style.display = show ? '' : 'none';
  if (labelGrp) labelGrp.style.display = show ? '' : 'none';
}

async function saveUser(id) {
  const un   = document.getElementById('uUsername').value.trim();
  const dn   = document.getElementById('uDisplayName').value.trim();
  const pw   = document.getElementById('uPassword').value;
  const role = document.getElementById('uRole').value;
  if (!dn || (!id && (!un || !pw))) { alert('กรุณาใส่ข้อมูลให้ครบ'); return; }
  const body = { username:un, display_name:dn, role };
  if (pw) body.password = pw;
  // ถ้าไม่ใช่ super_admin → เก็บ permissions + role_label
  if (role !== 'super_admin') {
    body.permissions = [...document.querySelectorAll('.perm-check:checked')].map(c=>c.value);
    body.role_label = (document.getElementById('uRoleLabel')?.value || '').trim();
    if (body.permissions.length === 0) { alert('กรุณาเลือกสิทธิ์อย่างน้อย 1 หมวด'); return; }
  }
  const r = id && id!=='null'
    ? await api.put('/users/'+id, body)
    : await api.post('/users', body);
  if (r.error) { toast('❌ '+r.error); return; }
  closeModal(); toast('✅ บันทึกแล้ว'); renderUsers();
}

async function delUser(id, name) {
  if (!confirm(`ลบผู้ใช้ "${name}" ?`)) return;
  const r = await api.delete('/users/'+id);
  if (r.error) { toast('❌ '+r.error); return; }
  toast('🗑 ลบแล้ว'); renderUsers();
}

async function saveProfile() {
  const dn   = document.getElementById('pDisplayName').value.trim();
  const pwd  = document.getElementById('pPwd').value;
  const pwd2 = document.getElementById('pPwd2').value;
  if (!dn) { alert('กรุณาใส่ชื่อที่แสดง'); return; }
  if (pwd && pwd !== pwd2) { toast('❌ รหัสผ่านไม่ตรงกัน'); return; }
  const uid = myUid();
  let r;
  if (uid === '0') {
    // Admin หลัก — บันทึกผ่าน settings
    const body = { author_name: dn };
    if (pwd) body.admin_password = pwd;
    r = await api.put('/settings', body);
  } else {
    const body = { display_name: dn };
    if (pwd) body.password = pwd;
    r = await api.put('/users/'+uid, body);
  }
  if (r.ok || !r.error) {
    localStorage.setItem('_display_name', dn);
    applyRole();
    toast('✅ บันทึกโปรไฟล์แล้ว');
  } else { toast('❌ '+r.error); }
}

// ── BACKUP: ดาวน์โหลดข้อมูลทั้งหมดเป็น JSON ─────────────
async function downloadBackup() {
  const btn = document.getElementById('backupBtn');
  const orig = btn.textContent;
  btn.textContent = '⏳ กำลังสร้างไฟล์...'; btn.disabled = true;
  try {
    const token = localStorage.getItem('_admtok');
    const resp = await fetch(API + '/backup', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!resp.ok) throw new Error('สำรองข้อมูลไม่สำเร็จ (' + resp.status + ')');
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'kruti-backup-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('✅ ดาวน์โหลดไฟล์สำรองแล้ว — เก็บไว้ในที่ปลอดภัย');
  } catch(e) { toast('❌ ' + e.message); }
  btn.textContent = orig; btn.disabled = false;
}

function getCatList() { return window._cats || []; }
function renderCatList() {
  const cats = getCatList();
  document.getElementById('catList').innerHTML = cats.map((c,i)=>
    `<span style="display:inline-flex;align-items:center;gap:6px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;padding:5px 12px;border-radius:100px;font-size:.88rem;font-weight:700;">

    </span>`
  ).join('');
}
function addCat() {
  const inp = document.getElementById('newCatInput');
  const v = inp.value.trim();
  if (!v || getCatList().includes(v)) return;
  window._cats.push(v);
  renderCatList();
  inp.value = '';
}
function removeCat(i) {
  window._cats.splice(i, 1);
  renderCatList();
}

async function saveSettings() {
  const pwd  = document.getElementById('sNewPwd').value;
  const pwd2 = document.getElementById('sNewPwd2').value;
  if (pwd && pwd !== pwd2) { toast('❌ รหัสผ่านไม่ตรงกัน'); return; }
  // เผื่อพิมพ์ชื่อหมวดค้างในช่องแล้วยังไม่กด +เพิ่ม → เพิ่มให้อัตโนมัติ
  const pending = document.getElementById('newCatInput')?.value.trim();
  if (pending && !getCatList().includes(pending)) {
    window._cats.push(pending);
    document.getElementById('newCatInput').value = '';
  }
  const body = {
    site_title:  document.getElementById('sTitle').value,
    author_name: document.getElementById('sAuthor').value,
    site_tagline:document.getElementById('sTagline').value,
    site_desc:   document.getElementById('sDesc').value,
    imgbb_key:   document.getElementById('sImgbb').value,
    adsense_id:  document.getElementById('sAdsense').value,
    article_categories: JSON.stringify(getCatList()),
  };
  if (pwd) body.admin_password = pwd;
  const res = await api.put('/settings', body);
  if (res.ok) {
    _imgbbKey = null;
    // อัปเดต localStorage ทันที — dropdown หน้าเขียนบทความจะเห็นหมวดใหม่โดยไม่ต้อง refresh
    localStorage.setItem('_cats', JSON.stringify(getCatList()));
    if (body.site_title) document.getElementById('sideTitle').textContent = '✦ '+body.site_title;
    toast('✅ บันทึกการตั้งค่าแล้ว');
  }
  else toast('❌ '+(res.error||'เกิดข้อผิดพลาด'));
}

// Esc ปิด modal (เตือนถ้ามีข้อมูลกรอกไว้)
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  const modal = document.getElementById('modal');
  const ov = modal && modal.querySelector('.modal-ov');
  if (ov) closeModalSafe({ target: ov }, ov);
});

function closeModal() { document.getElementById('modal').innerHTML = ''; }

// ปิด modal เมื่อคลิกพื้นที่ว่าง — แต่เตือนก่อนถ้ามีการกรอกข้อมูลแล้ว (กันข้อมูลหาย)
function closeModalSafe(event, el) {
  if (event.target !== el) return; // คลิกในเนื้อหา modal ไม่ปิด
  const modal = document.getElementById('modal');
  // เก็บค่าจาก input/textarea/contenteditable ที่ผู้ใช้กรอก
  const fields = modal.querySelectorAll('input, textarea, [contenteditable="true"]');
  let hasData = false;
  fields.forEach(f => {
    if (f.type === 'checkbox' || f.type === 'radio' || f.type === 'hidden') return;
    const val = f.isContentEditable ? f.textContent.trim() : (f.value || '').trim();
    // ข้าม placeholder เริ่มต้นของ editor
    if (val && val !== 'เริ่มพิมพ์เนื้อหาที่นี่...') hasData = true;
  });
  if (hasData) {
    if (confirm('ปิดหน้าต่างนี้? ข้อมูลที่กรอกไว้จะหายทั้งหมด')) closeModal();
  } else {
    closeModal();
  }
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}
// toast พร้อมปุ่ม "ดูในเว็บจริง" — สำหรับหลังบันทึก/แก้ไข
function toastWithLink(msg, url) {
  const t = document.getElementById('toast');
  t.innerHTML = `<span>${msg}</span>
    <a href="${url}" target="_blank" rel="noopener"
       style="display:inline-block;margin-left:10px;padding:3px 11px;background:rgba(255,255,255,.18);
              border:1px solid rgba(255,255,255,.35);border-radius:99px;color:#fff;font-weight:700;font-size:.82rem;text-decoration:none;">
       👁 ดูในเว็บ</a>`;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 5000); // นานหน่อย จะได้ทันกด
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  const t = tok();
  if (!t) { showLogin(); return; }
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 15000); // 15 วิ เผื่อเน็ตมือถือช้า
    const resp = await fetch(API+'/auth/check', { headers: hdr(), signal: ctrl.signal });
    clearTimeout(timer);
    if (!resp.ok) throw new Error('server_' + resp.status);
    const check = await resp.json();

    if (check.authenticated) {
      if (check.role) localStorage.setItem('_role', check.role);
      if (check.display_name) localStorage.setItem('_display_name', check.display_name);
      if (check.username) localStorage.setItem('_username', check.username);
      showAdmin(); applyRole();
      const s = await api.get('/settings').catch(() => ({}));
      if (s.site_title) document.getElementById('sideTitle').textContent = '✦ '+s.site_title;
      if (s.article_categories) localStorage.setItem('_cats', s.article_categories);
      nav('dash');
    } else {
      // server ยืนยันชัดเจนว่า session หมด → ลบ token
      localStorage.removeItem('_admtok');
      showLogin();
    }
  } catch (e) {
    // network error / timeout — อาจแค่เน็ตหลุดชั่วคราว ไม่ใช่ session หมดจริง
    // จึง "ไม่ลบ token" เพื่อให้กดลองใหม่แล้วเข้าได้เลย ไม่ต้อง login ซ้ำ
    showAdminOfflineRetry();
  }
}

// เน็ตมีปัญหาตอนเช็ค auth — ไม่ลบ token ให้กดลองใหม่ได้ทันที
function showAdminOfflineRetry() {
  showLogin();
  const lp = document.getElementById('loginPage');
  if (!lp) return;
  const box = lp.querySelector('.login-box') || lp.firstElementChild;
  if (!box || box.querySelector('._initmsg')) return;
  const wrap = document.createElement('div');
  wrap.className = '_initmsg';
  wrap.style.cssText = 'margin-top:14px;text-align:center;';
  wrap.innerHTML = `
    <div style="background:#fef3e2;color:#c2660c;padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:10px;">
      เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ชั่วคราว — ยังไม่ได้ออกจากระบบ
    </div>
    <button onclick="init()" style="background:#2563eb;color:#fff;border:none;padding:10px 22px;border-radius:8px;font-family:'Sarabun';font-weight:700;font-size:.9rem;cursor:pointer;">
      🔄 ลองเชื่อมต่อใหม่
    </button>`;
  box.appendChild(wrap);
}
