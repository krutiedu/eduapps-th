<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" id="metaDesc" content="">
<title id="pageTitle">EduApps TH</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231e3a5f'/><text x='16' y='13' text-anchor='middle' fill='%23f59e0b' font-size='10' font-family='sans-serif'>%E2%9C%A6</text><text x='16' y='25' text-anchor='middle' fill='white' font-size='13' font-weight='bold' font-family='sans-serif'>K</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#f8f9fb;color:#1e293b;display:flex;flex-direction:column;min-height:100vh;}
main#app{flex:1;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;}

/* NAV */
#nav{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100;
     height:58px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:1.1rem;font-weight:800;color:#0f172a;cursor:pointer;}
.logo span{color:#2563eb;}
.nav-links{display:flex;gap:2px;list-style:none;}
.nav-links a{padding:6px 12px;border-radius:8px;font-size:.87rem;font-weight:700;
             color:#64748b;transition:.15s;}
.nav-links a:hover,.nav-links a.active{color:#0f172a;background:#f1f5f9;}
.nav-right{display:flex;align-items:center;gap:8px;}
.search-btn{background:#f1f5f9;border:none;padding:7px 12px;border-radius:8px;
            font-size:.82rem;color:#94a3b8;cursor:pointer;font-family:'Sarabun',sans-serif;}
.hamburger{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#1e293b;}
@media(max-width:640px){
  .hamburger{display:block;}
  .nav-links,.nav-right{display:none;}
  .nav-links.open{display:flex;position:absolute;top:58px;left:0;right:0;background:#fff;
                  flex-direction:column;padding:12px 16px;border-bottom:1px solid #e2e8f0;z-index:99;}
}

/* LAYOUT */
.container{max-width:1100px;margin:0 auto;padding:0 24px;}
.divider{height:1px;background:#e2e8f0;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:9px;
     font-family:'Sarabun',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;border:none;}
.btn-primary{background:#2563eb;color:#fff;transition:.15s;}
.btn-primary:hover{background:#1d4ed8;}
.btn-outline{background:#fff;color:#1e293b;border:1px solid #e2e8f0;}
.btn-outline:hover{background:#f8fafc;}
.tag{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:700;}
.tag-tech{background:#fff7ed;color:#9a3412;}
.tag-edu{background:#f0fdf4;color:#166534;}
.tag-ai{background:#eff6ff;color:#1d4ed8;}
.tag-news{background:#fdf4ff;color:#6b21a8;}
.tag-gen{background:#f1f5f9;color:#475569;}
.tag-math{background:#eff6ff;color:#1d4ed8;}
.tag-thai{background:#f0fdf4;color:#166534;}
.tag-mgmt{background:#fdf4ff;color:#6b21a8;}

/* AD SLOTS */
.ad-slot{background:#f1f5f9;border:1.5px dashed #cbd5e1;border-radius:10px;
         padding:14px;text-align:center;font-size:.8rem;color:#94a3b8;margin:20px 0;
         display:flex;align-items:center;justify-content:center;gap:6px;}

/* TICKER */
.ticker{background:#0f172a;color:#e2e8f0;padding:9px 24px;
        display:flex;align-items:center;gap:12px;font-size:.82rem;overflow:hidden;}
.ticker-badge{background:#2563eb;color:#fff;font-size:.7rem;font-weight:800;
              padding:3px 9px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.ticker-inner{overflow:hidden;flex:1;}
.ticker-text{white-space:nowrap;display:inline-block;animation:tick 30s linear infinite;}
@keyframes tick{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* CATEGORY FILTER */
.cat-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.cat-pill{padding:6px 14px;border-radius:100px;border:1px solid #e2e8f0;font-size:.82rem;
          font-weight:700;color:#64748b;cursor:pointer;background:#fff;transition:.15s;}
.cat-pill:hover,.cat-pill.active{background:#2563eb;color:#fff;border-color:#2563eb;}

/* SEC HEADER */
.sec-head{display:flex;align-items:center;justify-content:space-between;
          margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #f1f5f9;}
.sec-title{font-size:1.05rem;font-weight:800;color:#0f172a;
           display:flex;align-items:center;gap:8px;}
.sec-bar{width:3px;height:18px;background:#2563eb;border-radius:2px;}
.sec-bar-green{background:#059669;}
.sec-more{font-size:.83rem;color:#2563eb;cursor:pointer;font-weight:700;}

/* HERO FEATURED */
.hero-grid{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;margin-bottom:16px;}
.feat-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;}
.feat-card:hover{border-color:#93c5fd;transform:translateY(-2px);}
.feat-img{height:200px;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);
          display:flex;align-items:center;justify-content:center;font-size:3.5rem;
          position:relative;}
.feat-badge{position:absolute;top:10px;left:10px;background:#2563eb;color:#fff;
            font-size:.7rem;font-weight:800;padding:4px 10px;border-radius:6px;}
.feat-body{padding:16px 18px;}
.feat-card h2{font-size:1.1rem;font-weight:800;line-height:1.4;margin-bottom:8px;}
.feat-card p{font-size:.85rem;color:#64748b;line-height:1.7;}
.feat-meta{display:flex;gap:8px;align-items:center;margin-bottom:10px;font-size:.78rem;color:#94a3b8;}
.side-cards{display:flex;flex-direction:column;gap:10px;}
.side-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;cursor:pointer;transition:.2s;}
.side-card:hover{border-color:#93c5fd;}
.side-card h3{font-size:.9rem;font-weight:700;line-height:1.45;margin-bottom:5px;}
.side-card p{font-size:.8rem;color:#64748b;}
.side-meta{display:flex;gap:7px;align-items:center;margin-bottom:8px;font-size:.77rem;color:#94a3b8;}

/* ARTICLES GRID */
.arts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.art-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;cursor:pointer;transition:.2s;}
.art-card:hover{border-color:#93c5fd;transform:translateY(-1px);}
.art-meta{display:flex;gap:7px;align-items:center;margin-bottom:8px;font-size:.77rem;color:#94a3b8;}
.art-card h3{font-size:.9rem;font-weight:700;line-height:1.45;margin-bottom:6px;}
.art-card p{font-size:.8rem;color:#64748b;line-height:1.6;}
.art-date{font-size:.75rem;color:#94a3b8;margin-top:8px;}

/* ARTICLE PAGE */
.art-wrap{max-width:720px;margin:0 auto;padding:40px 24px;}
.art-wrap h1{font-size:1.9rem;font-weight:800;line-height:1.3;margin-bottom:12px;}
.art-info{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:24px;
          padding-bottom:20px;border-bottom:1px solid #e2e8f0;font-size:.83rem;color:#94a3b8;}
.art-body h2{font-size:1.3rem;font-weight:800;margin:24px 0 8px;}
.art-body h3{font-size:1.05rem;font-weight:700;margin:18px 0 6px;}
.art-body p{margin-bottom:12px;line-height:1.85;font-size:1rem;}
.art-body ul,.art-body ol{margin:0 0 12px 22px;}
.art-body li{margin-bottom:5px;line-height:1.75;}
.art-body code{font-family:'Fira Code',monospace;background:#f1f5f9;padding:1px 6px;border-radius:4px;font-size:.86em;color:#ea580c;}
.art-body pre{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin:12px 0;overflow-x:auto;}
.art-body pre code{background:none;padding:0;font-size:.88rem;color:#059669;}
.art-body blockquote{border-left:3px solid #2563eb;padding:10px 16px;margin:12px 0;background:#eff6ff;border-radius:0 8px 8px 0;color:#475569;}
.art-body a{color:#2563eb;}
.art-body img{border-radius:8px;margin:10px 0;width:100%;}
.art-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.9rem;}
.art-body th{text-align:left;padding:8px 10px;border-bottom:2px solid #e2e8f0;font-weight:700;color:#475569;}
.art-body td{padding:8px 10px;border-bottom:1px solid #f1f5f9;}
.art-body strong{color:#0f172a;}

/* COMMENTS */
.comments-box{margin-top:36px;padding-top:28px;border-top:1px solid #e2e8f0;}
.comments-box h3{font-size:1.1rem;font-weight:800;margin-bottom:16px;}
.comment-item{background:#f8fafc;border-radius:10px;padding:14px;margin-bottom:10px;}
.comment-meta{font-size:.8rem;color:#94a3b8;margin-bottom:6px;font-weight:700;}
.comment-text{font-size:.9rem;line-height:1.65;}
.comment-form{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-top:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-input,.form-ta{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;
                      padding:8px 12px;font-family:'Sarabun',sans-serif;font-size:.9rem;color:#1e293b;outline:none;}
.form-input:focus,.form-ta:focus{border-color:#93c5fd;}
.form-ta{min-height:100px;resize:vertical;}

/* APPS PAGE */
.apps-box{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:24px;}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.app-card{border:1px solid #e2e8f0;border-radius:10px;padding:14px;background:#fafafa;transition:.2s;position:relative;}
.app-card:hover{border-color:#93c5fd;background:#fff;box-shadow:0 4px 20px rgba(37,99,235,.1);}
/* Hover Preview */
.app-preview{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) scale(.96);
  width:280px;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);
  border:1px solid #e2e8f0;overflow:hidden;z-index:200;
  opacity:0;visibility:hidden;transition:opacity .18s ease,transform .18s ease;pointer-events:none;}
.app-card:hover .app-preview{opacity:1;visibility:visible;transform:translateX(-50%) scale(1);}
.app-preview img{width:100%;height:160px;object-fit:cover;display:block;}
.app-preview-ph{width:100%;height:160px;background:linear-gradient(135deg,#1e3a5f,#2563eb);
  display:flex;align-items:center;justify-content:center;font-size:3.5rem;}
.app-preview-info{padding:10px 12px;}
.app-preview-info p{font-size:.82rem;color:#475569;line-height:1.5;margin-bottom:6px;}
.app-preview-lock{display:inline-flex;align-items:center;gap:5px;background:#faf5ff;
  color:#7c3aed;border:1px solid #e9d5ff;padding:4px 10px;border-radius:100px;font-size:.75rem;font-weight:700;}
/* ไม่แสดงบนมือถือ */
@media(hover:none) and (pointer:coarse){.app-preview{display:none;}}
.app-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.app-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;
          justify-content:center;font-size:1.2rem;flex-shrink:0;}
.icon-blue{background:#eff6ff;}
.icon-green{background:#f0fdf4;}
.icon-purple{background:#faf5ff;}
.icon-orange{background:#fff7ed;}
.app-card h4{font-size:.9rem;font-weight:700;}
.app-card p{font-size:.78rem;color:#64748b;line-height:1.55;margin-bottom:10px;}
.app-btns{display:flex;gap:6px;}
.btn-open{flex:1;background:#2563eb;color:#fff;font-family:'Sarabun',sans-serif;
          font-size:.78rem;font-weight:700;padding:6px 0;border-radius:7px;border:none;cursor:pointer;}
.btn-pmt{flex:1;background:#f0fdf4;color:#166534;font-family:'Sarabun',sans-serif;
         font-size:.78rem;font-weight:700;padding:6px 0;border-radius:7px;
         border:1px solid #bbf7d0;cursor:pointer;transition:.15s;}
.btn-pmt.active,.btn-pmt:hover{background:#dcfce7;}
.pmt-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;
         padding:10px;margin-top:8px;display:none;}
.pmt-box.open{display:block;}
.pmt-box pre{font-family:'Fira Code',monospace;font-size:.75rem;color:#64748b;
             white-space:pre-wrap;word-break:break-word;margin-bottom:7px;}
.btn-copy{background:none;border:none;color:#2563eb;font-family:'Sarabun',sans-serif;
          font-size:.78rem;font-weight:700;cursor:pointer;}

/* PAGINATION */
.pagination{display:flex;gap:8px;justify-content:center;padding:24px 0;}
.page-btn{padding:7px 14px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;
          font-family:'Sarabun',sans-serif;font-size:.85rem;cursor:pointer;transition:.15s;}
.page-btn:hover,.page-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}

/* FOOTER */
footer{background:#0f172a;color:#64748b;padding:28px;margin-top:8px;}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-logo{font-size:1rem;font-weight:800;color:#fff;}
.footer-links{display:flex;gap:16px;font-size:.83rem;}
.footer-links a:hover{color:#93c5fd;}

/* LOADING & EMPTY */
.loading{text-align:center;padding:60px;color:#94a3b8;}
.empty{text-align:center;padding:60px;color:#94a3b8;}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #e2e8f0;
         border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* BACK BUTTON */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:#64748b;font-size:.87rem;
          margin-bottom:16px;cursor:pointer;transition:.15s;}
.back-btn:hover{color:#1e293b;}

/* SEARCH */
.search-row{display:flex;gap:10px;margin-bottom:16px;}
.search-in{flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:9px;
           padding:9px 14px;font-family:'Sarabun',sans-serif;font-size:.9rem;
           color:#1e293b;outline:none;}
.search-in:focus{border-color:#93c5fd;}

@media(max-width:768px){
  .hero-grid{grid-template-columns:1fr;}
  .arts-grid{grid-template-columns:repeat(2,1fr);}
  .form-row{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .arts-grid{grid-template-columns:1fr;}
  .apps-grid{grid-template-columns:1fr;}
}
/* Touch targets ≥44px บนอุปกรณ์สัมผัส */
@media(hover:none) and (pointer:coarse){
  .btn-open,.btn-pmt{padding:11px 0;font-size:.85rem;}
  .btn-copy{padding:9px 4px;}
  .btn{padding:11px 22px;}
  .nav-links a{padding:11px 16px;}
  .cat-pill,.filter-btn{padding:9px 16px;}
  .page-btn{padding:11px 16px;}
  .back-btn{padding:8px 0;}
  .sec-more{padding:6px 0;display:inline-block;}
}
</style>
</head>
<body>

<!-- TICKER -->

<!-- NAV -->

<main id="app"><div class="loading"><div class="spinner"></div><br>กำลังโหลด...</div></main>

<!-- LOCK MODAL -->
<div id="lockModal" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(15,23,42,.7);align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:28px 24px;max-width:360px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.3);">

      onkeydown="if(event.key==='Enter')submitLock()">
    <p id="lockErr" style="color:#dc2626;font-size:.85rem;margin-bottom:8px;display:none;">รหัสไม่ถูกต้อง กรุณาลองใหม่</p>
    <div style="display:flex;gap:8px;">
      <button onclick="closeLockModal()" style="flex:1;padding:10px;border:1px solid #e2e8f0;border-radius:9px;background:#f8fafc;font-family:'Sarabun',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;">ยกเลิก</button>
      <button onclick="submitLock()" style="flex:2;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:9px;font-family:'Sarabun',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;">🔓 ปลดล็อก</button>
    </div>
  </div>
</div>
<div id="appViewer" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.88);align-items:center;justify-content:center;padding:12px;">
  <div id="viewerBox" style="display:flex;flex-direction:column;width:100%;max-width:460px;height:88vh;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#0f172a;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:8px;min-width:0;">
        <span id="viewerIcon" style="font-size:1.2rem;flex-shrink:0;"></span>
        <span id="viewerTitle" style="color:#fff;font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></span>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button onclick="fullscreenApp()" title="ขยายเต็มจอ" style="background:#2563eb;color:#fff;border:none;padding:6px 11px;border-radius:7px;font-family:'Sarabun',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;">⛶ เต็มจอ</button>
        <button onclick="openInNewTab()" title="เปิดแท็บใหม่" style="background:#1e293b;color:#94a3b8;border:none;padding:6px 10px;border-radius:7px;font-family:'Sarabun',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;">↗</button>
        <button onclick="closeAppViewer()" title="ปิด" style="background:#dc2626;color:#fff;border:none;padding:6px 11px;border-radius:7px;font-family:'Sarabun',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;">✕</button>
      </div>

  </div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo" id="footerLogo">✦ EduApps TH</div>
    <div class="footer-links">
      <a href="#/blog">บทความ</a>
      <a href="#/apps">แอปทั้งหมด</a>
      <a href="#/about">เกี่ยวกับเรา</a>
      <a href="#/privacy">นโยบายความเป็นส่วนตัว</a>
      <a href="/admin/" style="color:#334155;">⚙</a>
    </div>
    <p id="footerText" style="font-size:.8rem;">© 2568 EduApps TH</p>
  </div>

<script>
'use strict';
const API = '/api';
let S = {}; // site settings

// ── FETCH HELPERS (มี cache 30 วิ ลดการยิง API ซ้ำ) ──────
const _cache = new Map();
function get(url, ttl = 30000) {
  const hit = _cache.get(url);
  if (hit && Date.now() - hit.t < ttl) return Promise.resolve(hit.v);
  return fetch(API + url).then(r => r.json()).then(v => {
    _cache.set(url, { t: Date.now(), v });
    return v;
  });
}
const token = () => localStorage.getItem('_tok');

function route() {
  const h = location.hash.replace('#','') || '/';
  document.querySelectorAll('.nav-links a').forEach(a =>
    a.classList.toggle('active', a.dataset.r === h || (h==='/' && a.dataset.r==='/')));
  document.getElementById('navLinks').classList.remove('open');
  window.scrollTo(0,0);
  if (h === '/' || h === '')         renderHome();
  else if (h === '/blog')            renderBlog();
  else if (h.startsWith('/article/'))renderArticle(h.slice(9));
  else if (h === '/apps')            renderApps();
  else if (h === '/about')           renderAbout();
  else if (h === '/privacy')         renderPrivacy();
  else                               document.getElementById('app').innerHTML = empty('ไม่พบหน้านี้','🌌');
}

const go = hash => { location.hash = hash; };
window.addEventListener('hashchange', route);
const toggleNav = () => document.getElementById('navLinks').classList.toggle('open');

let blogQ = '', blogCat = 'ทั้งหมด', blogPage = 1;
async function renderBlog(q, cat, page) {
  if (q !== undefined) blogQ = q;
  if (cat !== undefined) blogCat = cat;
  if (page !== undefined) blogPage = page;
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;

  const catParam = blogCat === 'ทั้งหมด' ? '' : blogCat;
  const url = `/articles?q=${encodeURIComponent(blogQ)}&category=${encodeURIComponent(catParam)}&page=${blogPage}`;
  const data = await get(url);
  const arts = data.articles || [];
  const total = data.total || 0;
  const pages = Math.ceil(total / 9);

  app.innerHTML = `
  <div class="container" style="padding-top:32px;padding-bottom:32px;">
    <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:20px;">📝 บทความทั้งหมด</h1>

    </div>
    <div class="cat-strip" id="blogCats"></div>
    ${adSlot()}
    ${arts.length
      ? `<div class="arts-grid">${arts.map(artCard).join('')}</div>`
      : `<div class="empty">📭<br>ไม่พบบทความ</div>`}
    ${pages > 1 ? `
    <div class="pagination">
      ${blogPage > 1 ? `<button class="page-btn" onclick="renderBlog(undefined,undefined,${blogPage-1})">← ก่อนหน้า</button>` : ''}
      ${[...Array(Math.min(pages,5))].map((_,i)=>{
        const p = i+1;
        return `<button class="page-btn ${p===blogPage?'active':''}" onclick="renderBlog(undefined,undefined,${p})">${p}</button>`;

async function submitComment(articleId) {
  const name = document.getElementById('cmtName').value.trim();
  const content = document.getElementById('cmtText').value.trim();
  const msg = document.getElementById('cmtMsg');
  if (!name || !content) { showMsg(msg, 'กรุณากรอกชื่อและความคิดเห็น', '#ea580c'); return; }
  const res = await fetch(API + '/comments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ article_id: articleId, name, content })
  }).then(r => r.json());
  if (res.ok) {
    document.getElementById('cmtName').value = '';
    document.getElementById('cmtText').value = '';
    showMsg(msg, '✓ ส่งความคิดเห็นแล้ว รอการอนุมัติจากผู้ดูแล', '#059669');
  }
}

let _allApps = [], _appFilter = 'all', _appSort = 'newest';

async function renderApps() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  const data = await get('/apps');
  _allApps = data.apps || [];
  _appFilter = 'all';
  _appSort = 'newest';
  drawApps();
}

function drawApps() {
  const app = document.getElementById('app');
  const cats = [...new Set(_allApps.map(a => a.category).filter(Boolean))];

  // --- sort ---
  const sorted = [..._allApps].sort((a, b) => {
    if (_appSort === 'oldest') return (a.created_at||'') > (b.created_at||'') ? 1 : -1;
    if (_appSort === 'name')   return (a.title||'').localeCompare(b.title||'', 'th');
    return (a.created_at||'') < (b.created_at||'') ? 1 : -1; // newest
  });

  // --- filter ---
  let filtered = sorted;
  if (_appFilter === 'free')   filtered = sorted.filter(a => !a.locked);
  else if (_appFilter === 'locked') filtered = sorted.filter(a => a.locked);
  else if (_appFilter !== 'all')    filtered = sorted.filter(a => a.category === _appFilter);

  // --- filter pills ---
  const pills = [
    {k:'all',    label:'ทั้งหมด'},
    {k:'free',   label:'🆓 ฟรี'},
    {k:'locked', label:'🔒 พรีเมียม'},
    ...cats.map(c => ({k:c, label:c})),
  ];

  const pillHTML = pills.map(p =>
    `<span class="cat-pill${_appFilter===p.k?' active':''}"
      onclick="setAppFilter('${p.k.replace(/'/g,"\\'")}')">
      ${p.label}${_appFilter===p.k&&_allApps.length?'':''}</span>`
  ).join('');

  const sortHTML = `
    <select onchange="setAppSort(this.value)"
      style="padding:7px 12px;border:1px solid #e2e8f0;border-radius:9px;font-family:'Sarabun',sans-serif;
             font-size:.85rem;font-weight:700;color:#1e293b;background:#fff;cursor:pointer;outline:none;">
      <option value="newest" ${_appSort==='newest'?'selected':''}>🕐 ล่าสุด</option>
      <option value="oldest" ${_appSort==='oldest'?'selected':''}>🕐 เก่าสุด</option>
      <option value="name"   ${_appSort==='name'  ?'selected':''}>🔤 ชื่อ A-Z</option>
    </select>`;

  // --- content ---
  let content = '';
  if (_appFilter === 'all' && filtered.length > 0) {
    // แยก 2 หมวดเมื่อไม่ได้กรอง
    const free   = filtered.filter(a => !a.locked);
    const locked = filtered.filter(a =>  a.locked);
    if (free.length > 0) content += `
      <div style="margin-bottom:28px;">
        <h2 style="font-size:1.05rem;font-weight:800;color:#059669;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
          🆓 แอปฟรี <span style="background:#f0fdf4;color:#059669;padding:2px 10px;border-radius:100px;font-size:.78rem;">${free.length}</span>
        </h2>
        <div class="apps-grid">${free.map(appCard).join('')}</div>
      </div>`;
    if (locked.length > 0) content += `
      <div style="margin-bottom:28px;">
        <h2 style="font-size:1.05rem;font-weight:800;color:#7c3aed;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
          🔒 แอปพรีเมียม <span style="background:#faf5ff;color:#7c3aed;padding:2px 10px;border-radius:100px;font-size:.78rem;">${locked.length}</span>
        </h2>
        <div class="apps-grid">${locked.map(appCard).join('')}</div>
      </div>`;
  } else if (filtered.length > 0) {
    content = `<div class="apps-grid">${filtered.map(appCard).join('')}</div>`;
  } else {
    content = `<div class="empty">📭<br>ไม่พบแอปที่ตรงกัน</div>`;
  }

  app.innerHTML = `
  <div class="container" style="padding-top:28px;padding-bottom:32px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
      <h1 style="font-size:1.5rem;font-weight:800;">🎮 แอปทั้งหมด</h1>
      ${sortHTML}
    </div>
    <div class="cat-strip" style="margin-bottom:20px;">${pillHTML}</div>
    ${adSlot()}
    ${content}
    <div style="margin-top:24px;">${adSlot()}</div>
  </div>`;
  activateAds();
}

function setAppFilter(f) { _appFilter = f; drawApps(); }
function setAppSort(s)   { _appSort   = s; drawApps(); }

// ── CARD TEMPLATES ───────────────────────────────────────
function artCard(a) {
  return `<div class="art-card" onclick="go('/article/${a.slug}')">
    <div class="art-meta"><span class="${catTag(a.category)}">${a.category}</span></div>
    <h3>${a.title}</h3>
    <p>${a.excerpt||''}</p>
    <div class="art-date">📅 ${fmt(a.created_at)}</div>
  </div>`;
}

function appCard(a) {
  const pid = `p_${a.id}`;
  const storedUrl = sessionStorage.getItem('unlocked_'+a.id);
  const isLocked = a.locked && !storedUrl;
  const appUrl = storedUrl || a.url;   // ใช้ URL จาก sessionStorage ถ้าปลดล็อกแล้ว
  const previewImg = a.preview_image
    ? `<img src="${esc(a.preview_image)}" alt="Preview" loading="lazy" onerror="this.parentNode.innerHTML='<div class=app-preview-ph>${a.icon||'🎮'}</div>'">`
    : `<div class="app-preview-ph">${a.icon||'🎮'}</div>`;
  const preview = `
    <div class="app-preview">
      ${previewImg}
      <div class="app-preview-info">
        <p>${esc(a.description||'')}</p>
        ${isLocked ? '<span class="app-preview-lock">🔒 ต้องใช้รหัสปลดล็อก</span>' : ''}
      </div>
    </div>`;
  return `<div class="app-card">
    ${preview}
    ${isLocked?'<div style="position:absolute;top:10px;right:10px;font-size:1.1rem;" title="แอปนี้ต้องใช้รหัสผ่าน">🔒</div>':''}
    <div class="app-top">
      <div class="app-icon icon-blue">${a.icon||'🎮'}</div>
      <div><h4>${esc(a.title)}</h4><span class="tag tag-math" style="font-size:.7rem;">${esc(a.category)}</span></div>
    </div>
    <p>${esc(a.description||'')}</p>
    <div class="app-btns">
      ${isLocked
        ? `<button class="btn-open" style="background:#64748b;" onclick="openLockModal(${a.id},'${esc(a.title).replace(/'/g,"\\'")}','${a.icon||'🎮'}')">🔒 ปลดล็อก</button>`
        : (appUrl ? `<button class="btn-open" onclick="openAppViewer('${encodeURI(appUrl)}','${esc(a.title).replace(/'/g,"\\'")}','${a.icon||'🎮'}')">🚀 เปิดแอป</button>` : '')
      }
      ${a.prompt ? `<button class="btn-pmt" id="pb_${a.id}" onclick="togglePmt('${pid}','pb_${a.id}')">📋 Prompt</button>` : ''}
    </div>
    ${a.prompt ? `<div class="pmt-box" id="${pid}">
      <pre>${esc(a.prompt)}</pre>
      <button class="btn-copy" onclick="doCopyPre('${pid}',this)">📋 คัดลอก Prompt</button>
    </div>` : ''}
  </div>`;
}

// ── UTILS ─────────────────────────────────────────────────
function togglePmt(pid, bid) {
  const box = document.getElementById(pid), btn = document.getElementById(bid);
  const open = box?.classList.contains('open');
  document.querySelectorAll('.pmt-box').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.btn-pmt').forEach(b=>b.classList.remove('active'));
  if (!open && box) { box.classList.add('open'); btn?.classList.add('active'); }
}

function doCopy(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ คัดลอกแล้ว!';
    setTimeout(() => btn.textContent = '📋 คัดลอก Prompt', 1800);
  });
}

function doCopyPre(pid, btn) {
  const pre = document.getElementById(pid)?.querySelector('pre');
  if (!pre) return;
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = '✓ คัดลอกแล้ว!';
    setTimeout(() => btn.textContent = '📋 คัดลอก Prompt', 1800);
  });
}

// ── APP PLAYER ───────────────────────────────────────────
let _viewerUrl = '';
function openAppViewer(url, title, icon) {
  _viewerUrl = url;
  document.getElementById('viewerFrame').src = url;
  document.getElementById('viewerTitle').textContent = title || 'แอป';
  document.getElementById('viewerIcon').textContent = icon || '🎮';
  document.getElementById('appViewer').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeAppViewer() {
  if (document.fullscreenElement) document.exitFullscreen?.();
  document.getElementById('appViewer').style.display = 'none';
  document.getElementById('viewerFrame').src = 'about:blank';
  document.body.style.overflow = '';
}
function openInNewTab() {
  if (_viewerUrl) window.open(_viewerUrl, '_blank');
}
// ขยายเต็มจอ — ใช้ Fullscreen API ของ device (จะหมุนแนวนอน/แนวตั้งตามแอปและอุปกรณ์)
function fullscreenApp() {
  const box = document.getElementById('viewerBox');
  if (!document.fullscreenElement) {
    const req = box.requestFullscreen || box.webkitRequestFullscreen || box.msRequestFullscreen;
    if (req) req.call(box);
    else {
      // iOS Safari fallback — fullscreen ที่ iframe โดยตรง
      const f = document.getElementById('viewerFrame');
      (f.webkitEnterFullscreen || f.requestFullscreen)?.call(f);
    }
  } else {
    document.exitFullscreen?.();
  }
}
// ปิด viewer ด้วยปุ่ม ESC (เฉพาะตอนไม่ได้อยู่ fullscreen)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.fullscreenElement
      && document.getElementById('appViewer').style.display === 'flex') closeAppViewer();
});

function catTag(cat) {
  const m = { 'เทคนิค':'tag tag-tech','วิชาการ':'tag tag-edu','AI & เครื่องมือ':'tag tag-ai','ข่าวการศึกษา':'tag tag-news' };
  return m[cat] || 'tag tag-gen';
}

function fmt(d) {
  if (!d) return '';
  try {
    return new Date(d).toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'});
  } catch { return d; }
}

function empty(msg, icon='📭') {
  return `<div class="empty"><div style="font-size:2.5rem;margin-bottom:12px;">${icon}</div><p>${msg}</p></div>`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// AdSense — แสดงโฆษณาจริงถ้าตั้งค่า Publisher ID แล้ว ไม่งั้นแสดง placeholder
function adSlot() {
  if (S.adsense_id) {
    return `<ins class="adsbygoogle" style="display:block;margin:20px 0;"
      data-ad-client="${S.adsense_id}" data-ad-format="auto" data-full-width-responsive="true"></ins>`;
  }
  return `<div class="ad-slot">📢 พื้นที่โฆษณา (ตั้งค่า AdSense ID ในหน้า Admin เพื่อแสดงโฆษณาจริง)</div>`;
}

function activateAds() {
  if (!S.adsense_id || !window.adsbygoogle) return;
  document.querySelectorAll('ins.adsbygoogle:not([data-adsbygoogle-status])').forEach(() => {
    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
  });
}

function showMsg(el, text, color) {
  el.textContent = text; el.style.color = color; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// ── CATEGORIES (อ่านจาก settings) ────────────────────────
function getCats() {
  try { return JSON.parse(S.article_categories || '[]'); } catch { return ['เทคนิค','วิชาการ','AI & เครื่องมือ','ข่าวการศึกษา','เคล็ดลับครู']; }
}
function loadCategories() {
  const el = document.getElementById('catStrip');
  if (!el) return;
  const cats = ['ทั้งหมด', ...getCats()];
  el.innerHTML = cats.map(c =>
    `<span class="cat-pill" onclick="go('/blog');setTimeout(()=>renderBlog(undefined,'${c}',1),50)">${c}</span>`
  ).join('');
}

// ── LOCK MODAL ────────────────────────────────────────────
let _lockAppId = null, _lockTitle = '', _lockIcon = '';
function openLockModal(id, title, icon) {
  _lockAppId = id; _lockTitle = title; _lockIcon = icon;
  document.getElementById('lockTitle').textContent = title;
  document.getElementById('lockInput').value = '';
  document.getElementById('lockErr').style.display = 'none';
  document.getElementById('lockModal').style.display = 'flex';
  setTimeout(() => document.getElementById('lockInput').focus(), 100);
}
function closeLockModal() { document.getElementById('lockModal').style.display = 'none'; }
async function submitLock() {
  const code = document.getElementById('lockInput').value.trim();
  if (!code) return;
  try {
    const r = await fetch(API + '/apps/' + _lockAppId + '/unlock', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code})
    });
    const d = await r.json();
    if (r.ok && d.url) {
      sessionStorage.setItem('unlocked_' + _lockAppId, d.url);  // เก็บ URL จริง ไม่ใช่ '1'
      closeLockModal();
      openAppViewer(d.url, _lockTitle, _lockIcon);
    } else {
      document.getElementById('lockErr').style.display = 'block';
      document.getElementById('lockInput').select();
    }
  } catch { document.getElementById('lockErr').style.display = 'block'; }
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  try {
    S = await get('/settings');
    const title = S.site_title || 'EduApps TH';
    document.getElementById('pageTitle').textContent = title;
    document.getElementById('metaDesc').content = S.site_desc || '';
    document.getElementById('logoTitle').textContent = title.replace(' TH','');
    document.getElementById('footerLogo').textContent = '✦ ' + title;
    document.getElementById('footerText').textContent = '© 2568 ' + title;

    // Open Graph / Twitter meta สำหรับแชร์โซเชียล
    setMeta('og:title', title);
    setMeta('og:description', S.site_desc || '');
    setMeta('og:type', 'website');
    setMeta('og:url', location.href);
    setMeta('twitter:card', 'summary');

    // โหลด AdSense loader script ถ้าตั้งค่าแล้ว
    if (S.adsense_id) {
      const sc = document.createElement('script');
      sc.async = true;
      sc.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${S.adsense_id}`;
      sc.crossOrigin = 'anonymous';
      document.head.appendChild(sc);
    }

    // Ticker
    const artData = await get('/articles?page=1');
    const ticker = (artData.articles||[]).map(a=>a.title).join('  |  ');
    document.getElementById('tickerText').textContent = ticker || '';
  } catch(e) { console.log('Settings load error', e); }
  route();
}

function setMeta(prop, content) {
  const attr = prop.startsWith('og:') ? 'property' : 'name';
  let el = document.querySelector(`meta[${attr}="${prop}"]`);
  if (!el) { el = document.createElement('meta'); el.setAttribute(attr, prop); document.head.appendChild(el); }
  el.content = content;
}

document.addEventListener('DOMContentLoaded', init);
window.togglePmt = togglePmt;
window.doCopy = doCopy;
window.doCopyPre = doCopyPre;
window.openAppViewer = openAppViewer;
window.closeAppViewer = closeAppViewer;
window.openInNewTab = openInNewTab;
window.fullscreenApp = fullscreenApp;
window.renderAbout = renderAbout;
window.renderPrivacy = renderPrivacy;
window.openLockModal = openLockModal;
window.closeLockModal = closeLockModal;
window.submitLock = submitLock;
window.setAppFilter = setAppFilter;
window.setAppSort = setAppSort;
window.go = go;
window.toggleNav = toggleNav;
window.renderBlog = renderBlog;
window.submitComment = submitComment;
